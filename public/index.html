// ── MONTE CARLO ENGINE ────────────────────────────────────────

function sigmoid(x, d) { return 1 / (1 + Math.exp(-x / d)); }

// NBA win probability
// team[5] = season point differential (net rating from ESPN)
// B2B: if away team on back-to-back, home gets +3.0 instead of +2.5
// H2H: up to 60% weight when 4+ games played — matters as much as net rating
function nbaWinProb(home, away, b2b, h2h) {
  const pd = home[5] - away[5] + (b2b.has(away[1]) ? 3.0 : 2.5);
  const hh = h2h[home[1]]?.[away[1]];
  if (hh && hh.games > 0) {
    const h2hWeight = Math.min(hh.games / 4, 0.60);
    const anrWeight = 1 - h2hWeight;
    return sigmoid(pd, 7) * anrWeight + (hh.wins / hh.games) * h2hWeight;
  }
  return sigmoid(pd, 7);
}

// NHL win probability
// Uses points percentage as base predictor (more directly tied to standings)
// team[2]=pts, team[3]=w, team[4]=l, team[5]=otl, team[6]=rem
// Blends points pct (70%) + L10 GD (30%) for recent form
function nhlWinProb(home, away, b2b, h2h={}) {
  const homePct = home[2] / ((home[3]+home[4]+home[5]+home[6]) * 2 || 1);
  const awayPct = away[2] / ((away[3]+away[4]+away[5]+away[6]) * 2 || 1);
  const homeL10 = (home[16]||0);
  const awayL10 = (away[16]||0);
  const pctDiff = (homePct - awayPct) * 4; // scale to meaningful range
  const l10Diff = (homeL10 - awayL10) * 0.1;
  const pd = pctDiff * 0.8 + l10Diff * 0.2 + (b2b.has(away[1]) ? 0.15 : 0.10);
  const hh = h2h[home[1]]?.[away[1]];
  if (hh && hh.games > 0) {
    const h2hWeight = Math.min(hh.games / 4, 0.25);
    const anrWeight = 1 - h2hWeight;
    return sigmoid(pd, 2.5) * anrWeight + (hh.wins / hh.games) * h2hWeight;
  }
  return sigmoid(pd, 2.5);
}

function simulatePlayIn(s7, s8, s9, s10, b2b, h2h) {
  const p7 = nbaWinProb(s7, s8, b2b, h2h);
  const g1w = Math.random() < p7 ? s7 : s8;
  const g1l = g1w === s7 ? s8 : s7;
  const p9 = nbaWinProb(s9, s10, b2b, h2h);
  const g2w = Math.random() < p9 ? s9 : s10;
  const p3 = nbaWinProb(g1l, g2w, b2b, h2h);
  const g3w = Math.random() < p3 ? g1l : g2w;
  return new Set([g1w[1], g3w[1]]);
}

function runNBAMonteCarlo(east, west, remaining, b2b, h2h, N=5000) {
  const all = [...east, ...west];
  const tm = {}; all.forEach(t => tm[t[1]] = t);
  const counts = {}; all.forEach(t => { counts[t[1]] = {mp:0,top6:0,pi:0,sp:0}; });
  for (let s=0; s<N; s++) {
    const wins = {}; all.forEach(t => { wins[t[1]] = t[2]; });
    for (const g of remaining) {
      if (!tm[g.home] || !tm[g.away]) continue;
      if (Math.random() < nbaWinProb(tm[g.home], tm[g.away], new Set(), h2h)) wins[g.home]++;
      else wins[g.away]++;
    }
    for (const conf of [east, west]) {
      const sorted = [...conf].sort((a,b) => {
        if (wins[b[1]] !== wins[a[1]]) return wins[b[1]] - wins[a[1]];  // 1. simulated wins
        const ah2h = h2h[a[1]]?.[b[1]];                                   // 2. H2H (min 2 games)
        if (ah2h && ah2h.games >= 2) {
          const diff = (ah2h.wins / ah2h.games) - 0.5;
          if (Math.abs(diff) > 0.0001) return diff > 0 ? -1 : 1;
        }
        return (b[15]||0) - (a[15]||0);                                   // 3. Conference record
      });
      // Pre-compute which teams are mathematically eliminated from top 6
      const confSorted6 = [...conf].sort((a,b) => b[2]-a[2]);
      const cur6thWins = confSorted6[5]?.[2] || 0;
      const elimFromTop6 = new Set(conf.filter(t => t[2] + t[4] < cur6thWins).map(t => t[1]));

      const top6 = sorted.slice(0,6).filter(t => !elimFromTop6.has(t[1]));
      const top6Set = new Set(top6.map(t => t[1]));
      top6.forEach(t => { counts[t[1]].top6++; counts[t[1]].mp++; });
      const pi = sorted.filter(t => !top6Set.has(t[1])).slice(0,4);
      pi.forEach(t => counts[t[1]].pi++);
      if (pi.length===4) {
        const winners = simulatePlayIn(pi[0],pi[1],pi[2],pi[3], b2b, h2h);
        pi.forEach(t => { if(winners.has(t[1])){counts[t[1]].sp++;counts[t[1]].mp++;} });
      }
    }
  }
  const odds = {};
  all.forEach(t => {
    const c = counts[t[1]];
    const hardElim = t[9];
    const clinched = t[10];
    // Find conference cutoff (10th seed wins = play-in cutoff)
    const confTeams = east.includes(t) ? east : west;
    const cutoff = confTeams[9]?.[2] || 0;
    const maxWins = t[2] + t[4];
    const mathElim = hardElim || maxWins < cutoff;

    const mp   = Math.round(c.mp/N*100);
    const auto = Math.round(c.top6/N*100);
    const pi   = Math.round(c.pi/N*100);
    const sp   = Math.round(c.sp/N*100);
    odds[t[1]] = {
      mp:   mathElim ? 0 : clinched==='auto' ? 100 : Math.min(99, Math.max(1, mp)),
      auto: mathElim ? 0 : clinched==='auto' ? 100 : Math.min(99, Math.max(mp>0?1:0, auto)),
      pi:   mathElim ? 0 : Math.min(99, Math.max(0, pi)),
      sp:   mathElim ? 0 : Math.min(99, Math.max(0, sp)),
      _rank: confTeams.indexOf(t) + 1,
    };
  });


  return odds;
}

function runNHLMonteCarlo(east, west, remaining, h2h={}, N=5000) {
  const all = [...east, ...west];
  const tm = {}; all.forEach(t => tm[t[1]] = t);
  const counts = {}; all.forEach(t => { counts[t[1]] = {mp:0,div:0,wc:0}; });
  for (let s=0; s<N; s++) {
    const pts = {}; all.forEach(t => { pts[t[1]] = t[2]; });
    for (const g of remaining) {
      if (!tm[g.home] || !tm[g.away]) continue;
      const wp = nhlWinProb(tm[g.home], tm[g.away], new Set(), h2h);
      if (Math.random() < 0.23) {
        // OT/SO — both get 1 pt, winner decided closer to 50/50
        pts[g.home]++; pts[g.away]++;
        if (Math.random() < 0.5 + (wp - 0.5) * 0.3) pts[g.home]++; else pts[g.away]++;
      } else {
        if (Math.random() < wp) pts[g.home]+=2; else pts[g.away]+=2;
      }
    }
    for (const conf of [east, west]) {
      const simWins = {}; conf.forEach(t => { simWins[t[1]] = t[3] + Math.floor((pts[t[1]] - t[2]) / 2); });
      const sorted = [...conf].sort((a,b) => (pts[b[1]]-pts[a[1]]) || (simWins[b[1]]-simWins[a[1]]));
      const divs = {}; sorted.forEach(t => { if(!divs[t[13]])divs[t[13]]=[]; divs[t[13]].push(t[1]); });
      const top3 = new Set(Object.values(divs).flatMap(d => d.slice(0,3)));
      const wc = sorted.filter(t => !top3.has(t[1])).slice(0,2).map(t => t[1]);
      const wcSet = new Set(wc);
      sorted.forEach(t => {
        if (top3.has(t[1])) { counts[t[1]].div++; counts[t[1]].mp++; }
        else if (wcSet.has(t[1])) { counts[t[1]].wc++; counts[t[1]].mp++; }
      });
    }
  }
  const odds = {};
  // Find current playoff cutoff — 8th best record in conference
  const confsSorted = [east, west].map(conf => {
    const divs = {};
    conf.forEach(t => { if(!divs[t[13]])divs[t[13]]=[]; divs[t[13]].push(t); });
    const top3 = new Set(Object.values(divs).flatMap(d => [...d].sort((a,b)=>b[2]-a[2]).slice(0,3).map(t=>t[1])));
    const wc = conf.filter(t=>!top3.has(t[1])).sort((a,b)=>b[2]-a[2]);
    const cutoff = wc[1]?.[2] || 0; // 2nd wild card points
    return { conf, cutoff, top3 };
  });

  all.forEach(t => {
    const c = counts[t[1]];
    const hardElim = t[9];
    const clinched = t[10];

    // Find this team's conference cutoff
    const confData = confsSorted.find(cd => cd.conf.some(x => x[1]===t[1]));
    const cutoff = confData?.cutoff || 0;
    const maxPts = t[2] + (t[6] * 2); // max possible points (2 pts per game)
    const mathElim = hardElim || maxPts < cutoff;

    const mp  = Math.round(c.mp/N*100);
    const div = Math.round(c.div/N*100);
    const wc  = Math.round(c.wc/N*100);
    odds[t[1]] = {
      mp:  mathElim ? 0 : clinched ? 100 : Math.min(99, Math.max(1, mp)),
      div: mathElim ? 0 : clinched==='div' ? 100 : Math.min(99, Math.max(0, div)),
      wc:  mathElim ? 0 : Math.min(99, Math.max(0, wc)),
    };
  });
  return odds;
}

async function fetchLiveData() {
  console.log('[live] Loading data.json...');
  const pill = document.querySelector('.livepill');
  if (pill) pill.innerHTML = `<div class="livdot"></div><div><div class="pill-main">LOADING...</div><div class="pill-sub">Data updates by 10 AM every morning</div></div>`;

  try {
    const res  = await fetch('/data.json');
    if (!res.ok) throw new Error(`data.json not found (${res.status})`);
    const data = await res.json();
    DATA = data;

    NBA.east  = data.nba.east;
    NBA.west  = data.nba.west;
    NBA.today = data.nba.today;
    NHL.east  = data.nhl.east;
    NHL.west  = data.nhl.west;
    NHL.today = data.nhl.today;

    const h2h    = data.nba.h2h  || {};
    const nbaB2B = new Set(data.nba.b2b || []);
    const nhlB2B = new Set(data.nhl.b2b || []);

    // Re-sort NBA standings by win percentage with H2H tiebreaker
    // Trust ESPN's official standings order — tiebreakers already applied

    // Compute tonight win probs
    const nbaTM = {}; [...NBA.east,...NBA.west].forEach(t => nbaTM[t[1]]=t);
    NBA.today = NBA.today.map(g => {
      const home=nbaTM[g.h], away=nbaTM[g.a];
      if (!home||!away) return g;
      if (g.hw !== 50) return g;
      const hw = Math.round(nbaWinProb(home, away, nbaB2B, h2h) * 100);
      return {...g, hw, aw: 100-hw};
    });

    const nhlH2H = data.nhl.h2h || {};
    const nhlTM = {}; [...NHL.east,...NHL.west].forEach(t => nhlTM[t[1]]=t);
    NHL.today = NHL.today.map(g => {
      const home=nhlTM[g.h], away=nhlTM[g.a];
      if (!home||!away) return g;
      if (g.hw !== 50) return g; // keep Vegas odds if available
      const hw = Math.round(nhlWinProb(home, away, nhlB2B, nhlH2H) * 100);
      return {...g, hw, aw: 100-hw};
    });

    // Run Monte Carlo
    console.log('[live] Running Monte Carlo...');
    MC_ODDS.nba = runNBAMonteCarlo(NBA.east, NBA.west, data.nba.remaining||[], nbaB2B, h2h, 20000);
    MC_ODDS.nhl = runNHLMonteCarlo(NHL.east, NHL.west, data.nhl.remaining||[], nhlH2H, 20000);

    console.log('[live] Done.');

    // Pre-calculate play-in sp% for both conferences
    for (const conf of [NBA.east, NBA.west]) {
      const s7=conf[6],s8=conf[7],s9=conf[8],s10=conf[9];
      if (!s7||!s8||!s9||!s10) continue;
      let r7=0,r8=0,r9=0,r10=0;
      const PN = 10000;
      for (let i=0; i<PN; i++) {
        const g1win7 = Math.random() < nbaWinProb(s7, s8, nbaB2B, h2h);
        const g1loser = g1win7 ? s8 : s7;
        const g2win9 = Math.random() < nbaWinProb(s9, s10, nbaB2B, h2h);
        const g2winner = g2win9 ? s9 : s10;
        const g3winLoser = Math.random() < nbaWinProb(g1loser, g2winner, nbaB2B, h2h);
        const seed8 = g3winLoser ? g1loser : g2winner;
        if (g1win7) r7++; else r8++;
        if (seed8===s7) r7++; else if (seed8===s8) r8++; else if (seed8===s9) r9++; else r10++;
      }
      PLAYIN_SP[s7[1]]=Math.round(r7/PN*100);
      PLAYIN_SP[s8[1]]=Math.round(r8/PN*100);
      PLAYIN_SP[s9[1]]=Math.round(r9/PN*100);
      PLAYIN_SP[s10[1]]=Math.round(r10/PN*100);
    }

    const updated = new Date(data.updatedAt).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',timeZone:'America/New_York'});
    if (pill) pill.innerHTML = `<div class="livdot"></div><div><div class="pill-main">UPDATED ${updated.toUpperCase()}</div><div class="pill-sub">Data updates by 10 AM every morning</div></div>`;

  } catch(err) {
    console.warn('[live] Could not load data.json:', err.message);
    if (pill) pill.innerHTML = `<div class="livdot" style="background:#dae3f4"></div><div><div class="pill-main">CACHED DATA</div><div class="pill-sub">Data updates by 10 AM every morning</div></div>`;
  }

  const sel = document.getElementById('tsel');
  buildSel();
  if (sel?.value) pick(sel.value);
  else setTimeout(()=>{ sel.value='MIA'; pick('MIA'); }, 150);
}

// ============================================================
// PLAYOFF ODDS — formula-based, honest
// Hard elimination: 0% if max wins < cutoff, always
// Note: backend Monte Carlo simulation replaces these nightly
// when deployed (see backend guide)
// ============================================================
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}

function nbaOdds(team, rank, conf) {
  // Use Monte Carlo odds if available
  if (MC_ODDS.nba?.[team[1]]) return MC_ODDS.nba[team[1]];

  const [,, w, l, rem,,,,, elim, clinched] = team;
  const cutoff  = conf[9][2];
  const cutoff6 = conf[5][2];
  // Hard eliminated
  if(elim || w+rem < cutoff) return {mp:0,auto:0,pi:0,sp:0};
  // Clinched auto playoff spot — 100% everything, win or lose doesn't matter
  if(clinched === 'auto') return {mp:100,auto:100,pi:0,sp:0};
  // Clinched play-in spot — 100% to make play-in, fighting for seeding
  if(clinched === 'pi') {
    const gap6 = w - cutoff6;
    const auto_ = clamp(80 + gap6*5, 40, 97);
    return {mp:100,auto:Math.round(auto_),pi:Math.round(100-auto_),sp:0};
  }
  const gap10 = w - cutoff;
  const gap6  = w - cutoff6;
  let mp, auto_, pi_, sp_;
  if(rank<=6) {
    auto_ = clamp(80 + gap6*5, 40, 97);
    pi_   = clamp(20 - gap6*5, 2, 55);
    mp    = clamp(auto_ + pi_*0.4, auto_, 99);
    sp_   = 0;
  } else if(rank<=10) {
    auto_ = clamp(15 + gap10*8, 1, 45);
    pi_   = clamp(80 - Math.abs(gap10)*5, 30, 97);
    const piBase = {7:62,8:52,9:36,10:28}[rank]||40;
    sp_   = clamp(piBase + gap10*3, 5, 80);
    mp    = clamp(auto_ + sp_*0.85, 1, 90);
  } else {
    const deficit = cutoff - w;
    if(w+rem < cutoff) return {mp:0,auto:0,pi:0,sp:0};
    mp    = clamp(25 - deficit*7, 1, 35);
    auto_ = clamp(5  - deficit*3, 0, 15);
    pi_   = clamp(30 - deficit*7, 2, 40);
    sp_   = 0;
  }
  return {mp:Math.round(mp), auto:Math.round(auto_), pi:Math.round(pi_), sp:Math.round(sp_)};
}

function nhlOdds(team, rank, conf) {
  // [0]name,[1]abbr,[2]pts,[3]w,[4]l,[5]otl,[6]rem,[7]streak,[8]color,[9]elim,[10]clinched,[11]confRank,[12]divRank,[13]div
  const pts = team[2], w = team[3], l = team[4], otl = team[5], rem = team[6];
  const elim = team[9], clinched = team[10], confRank = team[11], divName = team[13];
  if(elim) return {mp:0,div:0,wc:0};

  // Mathematically verify division clinch — don't just trust API flag
  // Must check that 4th place in division cannot catch us
  const mathClinchDiv = (() => {
    if(!conf) return clinched==='div';
    const divTeams = conf.filter(t=>t[13]===divName).sort((a,b)=>b[2]-a[2]);
    const fourth = divTeams[3];
    if(!fourth) return true;
    return pts > fourth[2] + fourth[6]*2; // our pts > their max possible pts
  })();

  // Mathematically verify playoff clinch (top 3 div OR wild card)
  const mathClinchPlayoff = (() => {
    if(!conf) return clinched==='playoff';
    // Check if even the 9th team in conference can't catch us
    const confSorted = [...conf].sort((a,b)=>b[2]-a[2]);
    const ninth = confSorted[8];
    if(!ninth) return true;
    return pts > ninth[2] + ninth[6]*2;
  })();

  if(mathClinchDiv) return {mp:100,div:100,wc:0};
  if(mathClinchPlayoff) return {mp:100,div:clinched==='div'?100:50,wc:50};

  // Monte Carlo may say 100% but if not mathematically clinched, cap at 99%
  if(MC_ODDS.nhl?.[team[1]]) {
    const mc = MC_ODDS.nhl[team[1]];
    const cappedDiv = mathClinchDiv ? mc.div : Math.min(99, mc.div);
    const cappedMp  = mathClinchPlayoff ? mc.mp : Math.min(99, mc.mp);
    return {
      mp:  cappedMp,
      div: cappedDiv,
      wc:  Math.min(99, mc.wc),
    };
  }
  const maxPts = pts + rem*2;
  const wcCutoff = 94; // approx wild card cutoff
  if(maxPts < wcCutoff - 8) return {mp:0,div:0,wc:0};
  const above = pts - wcCutoff;
  let mp, div_, wc_;
  if(confRank <= 3) { // division top 3 — in on division
    mp   = clamp(80 + above*1.5, 45, 98);
    div_ = clamp(75 + above*2, 30, 98);
    wc_  = 0;
  } else if(confRank <= 8) { // wild card position
    mp   = clamp(60 + above*3, 15, 95);
    div_ = clamp(20 + above*2, 2, 55);
    wc_  = clamp(55 + above*3, 10, 90);
  } else { // outside
    mp   = clamp(30 + above*4, 2, 65);
    div_ = clamp(5  + above*2, 0, 25);
    wc_  = clamp(25 + above*4, 2, 60);
  }
  return {mp:Math.round(mp), div:Math.round(div_), wc:Math.round(wc_)};
}

function wnbaOdds(team, rank, conf) {
  const [,,w,l] = team;
  const cutoff4 = conf[3][2];
  const cutoff5 = conf[4]?.[2]||0;
  const rem = 44-w-l;
  if(rank<=4) {
    const cushion = w-cutoff5;
    const base = clamp(70+cushion*9, 30, 97);
    return {mp:base};
  }
  const deficit = cutoff4-w;
  if(w+rem < cutoff4) return {mp:0};
  return {mp:clamp(35-deficit*9, 1, 50)};
}

// WHO TO CHEER FOR ENGINE
// Determines rivals above/below, finds their games tonight
// ============================================================
function getCheerItems(teamAbbr, conf, rank, todayGames, league) {
  const items = [];
  const myIdx = rank - 1;
  const myW   = conf[myIdx][2];  // wins (NBA/WNBA) or pts (NHL)
  const myRem = league==='nhl' ? conf[myIdx][6] : (conf[myIdx][4] || (82 - conf[myIdx][2] - conf[myIdx][3]));
  const playinCutoff = league==='nba' ? conf[9][2] : 0;

  // ── STEP 1: My own game first, always ──────────────────────
  const myGame = todayGames.find(g => g.h===teamAbbr || g.a===teamAbbr);
  const gameIco = league==='nhl' ? '🏒' : '🏀';
  if(myGame) {
    const myWP = myGame.h===teamAbbr ? myGame.hw : myGame.aw;
    items.push({
      type:'yourgame', ico: gameIco,
      matchup:`${myGame.a} @ ${myGame.h}`, time:myGame.t,
      tag:'YOUR GAME',
      body:`Your win probability: <strong>${myWP.toFixed(0)}%</strong>. Winning tonight is the #1 priority.${teamAbbr==='OKC'?' A win clinches the No. 1 seed in the West.':teamAbbr==='PIT'?' A win tonight clinches a playoff spot.':teamAbbr==='ATL'?' A win tonight clinches a guaranteed top 6 playoff spot!':''}`,
      hw:myGame.hw, aw:myGame.aw, home:myGame.h, away:myGame.a, cheerFor:null, cheerAgainst:null
    });
  } else {
    items.push({
      type:'watch', ico:'💤',
      matchup:'OFF TONIGHT', time:'No game', tag:'OFF NIGHT',
      body:`No game tonight. A loss by any team in the standings above you is worth exactly as much as a win.`,
      hw:50, aw:50, home:'', away:'', cheerFor:null, cheerAgainst:null
    });
  }

  // ── STEP 2: Every other relevant team in the conference ─────
  // Logic: we want EVERY relevant team to LOSE.
  // Root for whoever is playing them. Period.
  // Relevant = not eliminated, mathematically can still affect the race.
  // Sort by closest gap = most urgent first.
  // If two rivals share a game, show it once for the more urgent one.

  const bucket = [];   // one entry per relevant team with a game tonight
  const shownGames = new Set();

  conf.forEach(t => {
    if(t[1] === teamAbbr) return;

    // Elimination check
    if(t[9]) return;

    // NBA: skip teams that can't reach play-in or can't affect us
    if(league==='nba') {
      const tMax = t[2] + (t[4] || (82-t[2]-t[3]));
      if(tMax < playinCutoff) return;
    }

    // NHL: determine relevance based on division top 3 + wild card race
    if(league==='nhl') {
      const myTeamData = conf[myIdx];
      const myDiv = myTeamData[13];
      const tDiv  = t[13];
      const myDivRank = myTeamData[12];
      const tDivRank  = t[12];
      const myConfRank = myTeamData[11];
      const tConfRank  = t[11];

      // A team is "going in via division" if they're top 3 in their division
      const tGoingViaDiv = tDivRank <= 3;
      const myGoingViaDiv = myDivRank <= 3;

      // Can I still mathematically reach top 3 in my division?
      const myDivTeams = conf.filter(t2=>t2[13]===myDiv).sort((a,b)=>b[2]-a[2]);
      const myThird = myDivTeams[2];
      const myPts = myTeamData[2];
      const myRem2 = myTeamData[6];
      const canReachDivTop3 = myDivRank <= 3 || (myThird && myPts + myRem2*2 >= myThird[2]);

      // Skip div top 3 teams from OTHER divisions if I can't reach my own div top 3
      if(!canReachDivTop3 && myDiv !== tDiv && tDivRank <= 3) return;
      // Skip teams that are clearly not in any relevant race (eliminated or way out)
      if(t[9]) return;
    }

    // True games back
    const myTeam = conf[myIdx];
    const gap = league==='nhl'
      ? myW - t[2]
      : ((myTeam[2] - t[2]) + (t[3] - myTeam[3])) / 2;
    const absGap = Math.abs(gap);

    const tRem = league==='nhl' ? t[6] : (t[4] || (82-t[2]-t[3]));
    // A team behind us can only close the gap by tRem wins at most
    // A team ahead of us — we can only close by myRem wins at most
    if(gap > 0 && gap > tRem) return;   // they're behind — can't catch us
    if(gap < 0 && absGap > myRem) return; // they're ahead — we can't catch them
    if(absGap > (league==='nhl' ? 10 : 6)) return;

    // Find their game tonight — not involving us
    const g = todayGames.find(g2 =>
      (g2.h===t[1] || g2.a===t[1]) &&
      g2.h !== teamAbbr && g2.a !== teamAbbr
    );
    if(!g) return;

    bucket.push({ t, gap, absGap, g });
  });

  // Sort by urgency: smallest gap first
  bucket.sort((a,b) => a.absGap - b.absGap);

  // Build items, deduplicating games and detecting swing games
  bucket.forEach(({ t, gap, absGap, g }) => {
    const rv      = t[1];
    const gameKey = `${g.h}-${g.a}`;

    // If this game is already shown, skip
    if(shownGames.has(gameKey)) return;
    shownGames.add(gameKey);

    // Check if BOTH teams in this game are relevant rivals
    const opp = g.h===rv ? g.a : g.h;
    const oppEntry = bucket.find(b => b.t[1]===opp);
    const units = league==='nhl' ? 'pt' + (absGap===1 ? '' : 's') : (absGap===1 ? 'win' : 'wins');

    const sameSign = oppEntry && ((gap <= 0 && oppEntry.gap <= 0) || (gap > 0 && oppEntry.gap > 0));
    if(oppEntry && sameSign && absGap === oppEntry.absGap) {
      // SWING GAME — both teams are in our range
      const oppGap = oppEntry.gap;
      const oppAbsGap = oppEntry.absGap;
      const units = league==='nhl' ? 'pt' + (absGap===1 ? '' : 's') : (absGap===1 ? 'win' : 'wins');
      const oppUnits = oppAbsGap===1 ? 'win' : (league==='nhl' ? 'pts' : 'wins');

      // gap < 0 means rv is AHEAD of us, gap > 0 means rv is BEHIND us
      const rvDesc = gap < 0
        ? `<strong>${rv}</strong> is ${absGap} ${units} ahead of you`
        : gap === 0
          ? `<strong>${rv}</strong> is tied with you`
          : `<strong>${rv}</strong> is ${absGap} ${units} behind you`;
      const oppDesc = oppGap < 0
        ? `<strong>${opp}</strong> is ${oppAbsGap} ${oppUnits} ahead of you`
        : oppGap === 0
          ? `<strong>${opp}</strong> is tied with you`
          : `<strong>${opp}</strong> is ${oppAbsGap} ${oppUnits} behind you`;

      items.push({
        type:'swing', ico:'⚡',
        matchup:`${g.a} @ ${g.h}`, time:g.t,
        tag:`SWING GAME`,
        body:`${rvDesc}, ${oppDesc}. This game directly affects your position either way — root for whoever helps you most.`,
        hw:g.hw, aw:g.aw, home:g.h, away:g.a, cheerFor:null, cheerAgainst:null
      });
      return;
    }

    const oppWP = g.h===rv ? g.aw : g.hw;

    if(gap <= 0) {
      const desc = gap===0
        ? `tied with you — tiebreakers decide seeding`
        : `${absGap} ${units} ahead of you`;
      items.push({
        type:'cheerfor', ico:'🎯',
        matchup:`${g.a} @ ${g.h}`, time:g.t,
        tag:`CHEER FOR ${opp}`,
        body:`<strong>${rv}</strong> is ${desc}. <strong class="gg">Root for ${opp} tonight.</strong> They have a <strong>${oppWP.toFixed(0)}%</strong> chance.`,
        hw:g.hw, aw:g.aw, home:g.h, away:g.a, cheerFor:opp, cheerAgainst:rv
      });
    } else {
      items.push({
        type:'cheeragainst', ico:'🛡️',
        matchup:`${g.a} @ ${g.h}`, time:g.t,
        tag:`PROTECT YOUR SPOT`,
        body:`<strong>${rv}</strong> is ${absGap} ${units} behind you and still in range. <strong class="gg">Root for ${opp}</strong> to keep them there. They have a <strong>${oppWP.toFixed(0)}%</strong> chance.${teamAbbr==='OKC'&&rv==='SAS'?' A '+opp+' win guarantees the No. 1 seed in the West.':''}`,
        hw:g.hw, aw:g.aw, home:g.h, away:g.a, cheerFor:opp, cheerAgainst:rv
      });
    }
  });

  // ── SPECIAL CASE: Minnesota Timberwolves clinch scenario ─────
  if(teamAbbr === 'MIN' && league === 'nba') {
    // Remove OKC @ LAL entirely — LAL owns tiebreaker and is 4 games up with 4 left
    const noLAL = items.filter(item => item.home!=='LAL' && item.away!=='LAL');

    // Find PHX/HOU game — replace with clinch swing card
    const phxIdx = noLAL.findIndex(item => item.home==='PHX'||item.away==='PHX'||item.home==='HOU'||item.away==='HOU');
    if(phxIdx >= 0) {
      const existing = noLAL[phxIdx];
      noLAL[phxIdx] = {
        type:'swing', ico:'⚡',
        matchup:existing.matchup, time:existing.time||'',
        tag:'CLINCH WATCH',
        body:`<strong>This game matters two ways.</strong> A <strong class="gg">PHX loss + MIN win tonight clinches Minnesota a top 6 playoff seed.</strong> Also, MIN trails HOU by 3 games for the 5 seed — a Rockets loss tonight keeps that race alive.`,
        hw:existing.hw, aw:existing.aw, home:existing.home, away:existing.away, cheerFor:'HOU', cheerAgainst:'PHX'
      };
    } else {
      // PHX/HOU game not yet in list — add it
      const phxGame = todayGames.find(g=>(g.h==='PHX'&&g.a==='HOU')||(g.h==='HOU'&&g.a==='PHX'));
      if(phxGame) {
        noLAL.push({
          type:'swing', ico:'⚡',
          matchup:`${phxGame.a} @ ${phxGame.h}`, time:phxGame.t||'',
          tag:'CLINCH WATCH',
          body:`<strong>This game matters two ways.</strong> A <strong class="gg">PHX loss + MIN win tonight clinches Minnesota a top 6 playoff seed.</strong> Also, MIN trails HOU by 3 games for the 5 seed — a Rockets loss tonight keeps that race alive.`,
          hw:phxGame.hw, aw:phxGame.aw, home:phxGame.h, away:phxGame.a, cheerFor:'HOU', cheerAgainst:'PHX'
        });
      }
    }
    return noLAL.slice(0, 8);
  }

  return items.slice(0, 8);
}

  // My own game yesterday
  const myGame = yesterdayGames.find(g => g.h===teamAbbr || g.a===teamAbbr);
  if (myGame) {
    const iWon = myGame.winner === teamAbbr;
    const opp  = myGame.h===teamAbbr ? myGame.a : myGame.h;
    items.push({
      good: iWon,
      ico: iWon ? '✅' : '❌',
      matchup: `${myGame.a} @ ${myGame.h}`,
      tag: 'YOUR GAME',
      body: iWon
        ? `You beat <strong>${opp}</strong> — good result.`
        : `You lost to <strong>${opp}</strong> — tough loss.`
    });
  } else {
    items.push({
      good: null,
      ico: '💤',
      matchup: 'OFF DAY',
      tag: 'NO GAME',
      body: `You had no game yesterday.`
    });
  }

  // Rival games yesterday — same logic as cheer section
  const shownGames = new Set();
  conf.forEach(t => {
    if (t[1] === teamAbbr) return;
    if (t[9]) return;

    if (league==='nba') {
      const tMax = t[2] + (t[4] || (82-t[2]-t[3]));
      const playinCutoff = conf[9][2];
      if (tMax < playinCutoff) return;
    }

    if (league==='nhl') {
      const myTeamData = conf[myIdx];
      const myDiv = myTeamData[13], tDiv = t[13];
      const myDivRank = myTeamData[12], tDivRank = t[12];
      const myConfRank = myTeamData[11], tConfRank = t[11];
      const sameDivRace = myDiv===tDiv && (myDivRank<=4||tDivRank<=4);
      const wcRace = myConfRank>3 && tConfRank>3;
      const chasingDiv = myDiv!==tDiv && tDivRank<=3 && myConfRank<=6;
      if (!sameDivRace && !wcRace && !chasingDiv) return;
    }

    const myTeam = conf[myIdx];
    const gap = league==='nhl'
      ? myW - t[2]
      : ((myTeam[2]-t[2])+(t[3]-myTeam[3]))/2;
    const absGap = Math.abs(gap);
    const tRem = league==='nhl' ? t[6] : (t[4]||(82-t[2]-t[3]));
    if (gap>0 && gap>tRem*2) return;
    if (gap<0 && absGap>myRem*2) return;
    if (absGap > (league==='nhl' ? 10 : 6)) return;

    const g = yesterdayGames.find(g2 =>
      (g2.h===t[1]||g2.a===t[1]) &&
      g2.h!==teamAbbr && g2.a!==teamAbbr
    );
    if (!g) return;

    const gameKey = `${g.h}-${g.a}`;
    if (shownGames.has(gameKey)) return;
    shownGames.add(gameKey);

    const rv  = t[1];
    const opp = g.h===rv ? g.a : g.h;
    const units = league==='nhl' ? 'pt' + (absGap===1 ? '' : 's') : (absGap===1 ? 'win' : 'wins');
    const rvLost = g.winner !== rv;

    if (gap <= 0) {
      // rv is ahead — we wanted them to lose
      items.push({
        good: rvLost,
        ico: rvLost ? '✅' : '❌',
        matchup: `${g.a} @ ${g.h}`,
        tag: rvLost ? `GOOD RESULT` : `BAD RESULT`,
        body: rvLost
          ? `<strong>${rv}</strong> lost to <strong>${opp}</strong> — exactly what you needed. They're ${absGap} ${units} ahead of you.`
          : `<strong>${rv}</strong> beat <strong>${opp}</strong> — bad news. They're ${absGap} ${units} ahead of you.`
      });
    } else {
      // rv is behind — we wanted them to lose to protect our spot
      items.push({
        good: rvLost,
        ico: rvLost ? '✅' : '❌',
        matchup: `${g.a} @ ${g.h}`,
        tag: rvLost ? `SPOT PROTECTED` : `WATCH OUT`,
        body: rvLost
          ? `<strong>${rv}</strong> lost to <strong>${opp}</strong> — good, they stay ${absGap} ${units} behind you.`
          : `<strong>${rv}</strong> beat <strong>${opp}</strong> — they're closing in, now ${absGap} ${units} behind you.`
      });
    }
  });

  return items.slice(0, 8);
}

function renderRecap(items) {
  if (!items.length) return '<div style="padding:16px;color:#73757d;font-size:13px;text-align:center">No recap available.</div>';
  return items.map(item => `
    <div class="ccard" style="border-left:3px solid ${item.good===true?'#a1ffc2':item.good===false?'#ff716b':'rgba(255,255,255,0.06)'}">
      <div class="ctop">
        <span class="cico">${item.ico}</span>
        <div class="cmid">
          <div class="cmatchup">${item.matchup}</div>
          <div class="ctag" style="color:${item.good===true?'#a1ffc2':item.good===false?'#ff716b':'#73757d'}">${item.tag}</div>
        </div>
      </div>
      <div class="cbody">${item.body}</div>
    </div>
  `).join('');
}
function getStory(team, rank, conf, odds, league) {
  const name = team[0];
  // Safely extract streak — always at index 7 for NBA/NHL, WNBA has no streak
  const streak = (typeof team[7] === 'string' && team[7].match(/^[WL]\d+$/)) ? team[7] : '';
  const w   = league==='nhl' ? team[3] : team[2];
  const l   = league==='nhl' ? team[4] : team[3];
  const rem = league==='nhl' ? team[6] : (league==='wnba' ? 44-team[2]-team[3] : team[4]);
  const l10w = league==='nba' ? (team[6]||0) : 0;
  const elim     = team[9] || false;
  const clinched = team[10] || false;
  const streakN = parseInt(streak.replace(/[WL]/,''))||1;
  const hot = streak.startsWith('W')&&streakN>=3;
  const cold = streak.startsWith('L')&&streakN>=3;
  
  if(league==='nba') {
    const cutoff = conf[9][2];
    const maxW = w+rem;
    if(elim || maxW<cutoff) {
      return {urg:'dim',h:'Season Over',sub:'Mathematically eliminated',
        b:`<strong>${name}</strong> are mathematically eliminated. Max possible wins: <strong>${maxW}</strong>. The play-in requires <strong>${cutoff}</strong> wins. The remaining ${rem} games are about development and next year.`};
    }
    if(clinched && rank<=2) return {urg:'green',h:'Elite Territory',sub:`#${rank} seed — home court throughout`,
      b:`<strong class="gg">${name}</strong> are one of the elite teams in the conference at #${rank}. Home court throughout the playoffs. The mission now: stay healthy heading into April.`};
    if(clinched && rank<=6) {
      const gap = w-conf[5][2];
      return {urg:'green',h:'Playoff Bound',sub:`#${rank} — ${gap} win${gap!==1?'s':''} clear of play-in`,
        b:`<strong class="gg">${name}</strong> have clinched a guaranteed playoff spot at #${rank}.${hot?` The <strong class="gg">${streakN}-game win streak</strong> has this team peaking.`:''} Focus: seeding and first-round matchup.`};
    }
    if(rank===7) return {urg:'amber',h:'One Win Away',sub:'#7 seed — best play-in path',
      b:`<strong>${name}</strong> hold the #7 seed — <strong>the best play-in position</strong>. Win once against #8 and they're in the playoffs outright. Overall: <strong class="aa">${odds.mp}%</strong> to make it.${hot?` The <strong class="gg">${streakN}-game win streak</strong> is perfect momentum.`:''}`};
    if(rank===8) return {urg:'amber',h:'Two Paths In',sub:'#8 seed — upset or survive',
      b:`<strong>${name}</strong> are the #8 seed. Path 1: upset the #7 and steal their spot. Path 2: lose, then win Game 3 for the 8-seed. Overall: <strong class="aa">${odds.mp}%</strong> to make the playoffs.${cold?` <strong class="rr">The ${streakN}-game skid is concerning.</strong>`:''}`};
    if(rank===9) return {urg:'red',h:'Must Win Twice',sub:'#9 seed — hardest play-in path',
      b:`<strong class="rr">${name} must win two consecutive games</strong> to reach the playoffs. Beat #10, then beat the G1 loser. Overall: <strong class="aa">${odds.mp}%</strong>. Climbing to #7 or #8 changes everything.`};
    if(rank===10) return {urg:'red',h:'On The Bubble',sub:'#10 seed — must win twice',
      b:`<strong class="rr">${name} must win two consecutive play-in games</strong> to reach the playoffs. <strong class="aa">${odds.mp}%</strong> chance. ${hot?`The <strong class="gg">${streakN}-game win streak</strong> is this team's best asset.`:cold?`<strong class="rr">The ${streakN}-game losing skid is a real problem.</strong>`:''}`};
    // Outside play-in entirely
    const deficit = cutoff - w; // positive = behind, negative = ahead
    if (deficit <= 0) {
      // They're actually in or above the play-in — shouldn't reach here but just in case
      const ahead = Math.abs(deficit);
      return {urg:'amber',h:'Holding On',sub:`${ahead} win${ahead!==1?'s':''} above the play-in line`,
        b:`<strong>${name}</strong> are ${ahead} win${ahead!==1?'s':''} above the play-in cutoff with ${rem} games left. <strong class="aa">${odds.mp}%</strong> chance to make the playoffs.`};
    }
    return {urg:'red',h:'Chasing the Bubble',sub:`${deficit} win${deficit!==1?'s':''} outside the play-in`,
      b:`<strong>${name}</strong> are ${deficit} win${deficit!==1?'s':''} behind the play-in cutoff with ${rem} games left. ${w+rem>=cutoff?`They need to win almost every game AND get help from above. <strong class="aa">${odds.mp}%</strong> chance.`:`<strong class="rr">Mathematically eliminated</strong> — max ${w+rem} wins, need ${cutoff}.`}`};
  }
  
  if(league==='nhl') {
    // [0]name,[1]abbr,[2]pts,[3]w,[4]l,[5]otl,[6]rem,[7]streak,[8]color,[9]elim,[10]clinched,[11]confRank,[12]divRank,[13]div
    const pts = team[2], rem = team[6], elim_ = team[9], clinched_ = team[10], confRank = team[11], div = team[13];
    const divRank = team[12];
    const wcCutoff = conf[7]?.[2] || 72;
    const ptsBack = wcCutoff - pts;
    if(elim_) return {urg:'dim',h:'Season Over',sub:'Mathematically eliminated',
      b:`<strong>${name}</strong> have been eliminated from playoff contention.`};
    if(clinched_==='div') return {urg:'green',h:'Division Champions',sub:`${div} Division — Clinched`,
      b:`<strong class="gg">${name}</strong> have clinched the ${div} Division at ${pts} points with ${rem} games left.${hot?` On a <strong class="gg">${streakN}-game win streak</strong>.`:''} Focus: home ice seeding.`};
    if(clinched_==='playoff') return {urg:'green',h:'Playoff Bound',sub:`Conf #${rank} — Clinched`,
      b:`<strong class="gg">${name}</strong> have clinched a playoff spot with ${pts} points and ${rem} games left.${hot?` The <strong class="gg">${streakN}-game win streak</strong> has this team peaking.`:''}`};
    if(confRank<=3) return {urg:'green',h:'Division Leader',sub:`${div} #${divRank} · Conf #${rank}`,
      b:`<strong>${name}</strong> sit in a division top-3 spot at <strong>${pts} points</strong>. They control their own destiny.${hot?` The <strong class="gg">${streakN}-game win streak</strong> is building momentum.`:cold?` <strong class="rr">The ${streakN}-game skid is a concern — protect this position.</strong>`:''}`};
    if(confRank<=8) return {urg:'amber',h:'Wild Card Race',sub:`Conf #${rank} — ${pts} pts · In playoff position`,
      b:`<strong>${name}</strong> are in wild card position at ${pts} points.${ptsBack<=4?` Only <strong>${Math.abs(ptsBack)} pts</strong> separate them from the bubble — this race is tight.`:''}${cold?` <strong class="rr">The ${streakN}-game losing streak is a serious threat to this position.</strong>`:hot?` A <strong class="gg">${streakN}-game win streak</strong> has them moving in the right direction.`:''}`};
    return {urg:'red',h:'Chasing the Wild Card',sub:`Conf #${rank} · ${Math.abs(ptsBack)} pts back`,
      b:`<strong>${name}</strong> are outside the playoff picture at ${pts} points with ${rem} games left. They need to win and get help ahead of them.${cold?` <strong class="rr">The ${streakN}-game skid makes this an uphill battle.</strong>`:''}`};
  }

  if(league==='wnba') {
    const [,,w,l] = team;
    const cutoff = conf[3][2];
    if(rank<=4) {
      const cushion = w-(conf[4]?.[2]||0);
      return {urg:cushion>=4?'green':'amber',h:cushion>=4?'Secure in Playoffs':'Holding On',
        sub:`#${rank} seed · ${cushion}-win cushion`,
        b:`<strong>${name}</strong> hold the #${rank} seed with a ${cushion}-win cushion over 5th place.${cushion<=2?` The margin is thin in a 44-game season.`:''}`};
    }
    const deficit = cutoff-w;
    return {urg:'red',h:'Outside the Playoffs',sub:`${deficit} win${deficit!==1?'s':''} back`,
      b:`<strong>${name}</strong> are ${deficit} win${deficit!==1?'s':''} outside the playoff picture with ${44-w-l} games remaining.`};
  }
  
  return {urg:'dim',h:'—',sub:'',b:''};
}

function renderProbs(odds, team, rank, league, conf) {
  // NBA:  [0]name,[1]abbr,[2]w,[3]l,[4]rem,[5]diff,[6]l10w,[7]streak,[8]color,[9]elim,[10]clinched
  // NHL:  [0]name,[1]abbr,[2]pts,[3]w,[4]l,[5]otl,[6]rem,[7]streak,[8]color,[9]elim,[10]clinched,[11]confRank
  // WNBA: [0]name,[1]abbr,[2]w,[3]l,[4]color
  const w   = league==='nhl' ? team[3] : team[2];
  const l   = league==='nhl' ? team[4] : team[3];
  const rem = league==='nhl' ? team[6] : (league==='wnba' ? 44-team[2]-team[3] : team[4]);
  const oc = c => c>60?'#a1ffc2':c>30?'#dae3f4':'#ff716b';
  let rows = '';

  if(league==='nba') {
    const cutoff  = conf[9][2];
    const cutoff6 = conf[5][2];
    const team7   = conf[6];
    const team10  = conf[9];
    const team11  = conf[10];

    // HARD ELIMINATION: can't reach 10th place even winning everything
    const hardElim = team[9] || (w + rem < (team10?.[2] || 0));

    // HARD CLINCHED TOP 6: 7th seed can't catch current wins even winning everything
    const clinchTop6 = rank <= 6 && (team[10] === 'auto' || (team7 && team7[2] + team7[4] < w));

    // HARD CLINCHED PLAYIN: 11th seed can't catch current wins even winning everything
    const clinchPlayIn = rank >= 7 && rank <= 10 && team11 && (team11[2] + team11[4] < w);

    // MATH ELIMINATED FROM TOP 6: max possible wins can't reach 6th seed's current wins
    const team6 = conf[5];
    const stuckInPlayIn = rank >= 7 && rank <= 10 && team6 && (w + rem < team6[2]);

    // sp% from play-in bracket — the exact number shown in the bracket
    const spVal = PLAYIN_SP[team[1]] ?? odds.sp;

    let autoDisplay, piDisplay, mpDisplay;

    if (hardElim) {
      // Eliminated — 0% everything
      autoDisplay = 0; piDisplay = 0; mpDisplay = 0;
    } else if (clinchTop6) {
      // Clinched top 6 — 100% everything, 0% play-in risk
      autoDisplay = 100; piDisplay = 0; mpDisplay = 100;
    } else if (rank <= 6) {
      // Top 6 but not clinched — Monte Carlo
      autoDisplay = Math.min(99, Math.max(1, odds.auto));
      piDisplay   = Math.min(99, Math.max(1, odds.pi));
      mpDisplay   = Math.min(99, Math.max(1, Math.round(autoDisplay + (piDisplay/100) * spVal)));
    } else if (stuckInPlayIn) {
      // Mathematically stuck in play-in — use exact play-in bracket number
      autoDisplay = 0;
      piDisplay   = clinchPlayIn ? 100 : Math.min(99, Math.max(1, odds.pi));
      mpDisplay   = spVal;
    } else {
      // Play-in team that can still reach top 6 — full Monte Carlo
      autoDisplay = Math.min(99, Math.max(1, odds.auto));
      piDisplay   = Math.min(99, Math.max(1, odds.pi));
      mpDisplay   = Math.min(99, Math.max(1, Math.round(autoDisplay + (piDisplay/100) * spVal)));
    }

    rows += probRow('% to Make the Playoffs', '', mpDisplay, oc(mpDisplay), 'pbar1', hardElim?0:clinchTop6?100:spVal);
    nbaMP = mpDisplay; nbaAuto = autoDisplay; nbaPi = piDisplay;

    if(!hardElim) {
      rows += `<div class="prow"><div style="height:1px;background:rgba(255,255,255,0.06);margin:0"></div></div>`;
      rows += probRow('% to Clinch Guaranteed Spot (Top 6)',
        rank<=6?`Currently #${rank} — defending auto spot`:(()=>{const gb=((confTeams[5][2]-w)+(l-confTeams[5][3]))/2;return gb<=0?`${Math.abs(gb).toFixed(1)} GB above the line`:`${gb.toFixed(1)} GB back of auto spot`;})(),
        autoDisplay, oc(autoDisplay), 'pbar2');

      if(rank>=7 && rank<=10) {
        rows += `<div class="prow"><div style="height:1px;background:rgba(255,255,255,0.06);margin:0"></div></div>`;
        rows += probRow('% to Be in Play-In Tournament',
          rank<=6?'Risk of falling into play-in zone':rank<=10?`Currently the #${rank} seed in play-in`:'Must reach top 10 first',
          piDisplay, '#dae3f4', 'pbar3');

        rows += `<div class="prow"><div style="height:1px;background:rgba(255,255,255,0.06);margin:0"></div></div>`;
        rows += probRow('% to Survive Play-In Tournament',
          rank===7?'1 win needed — best path':rank===8?'Win G1 or survive G3':'Must win 2 consecutive games',
          spVal, '#ce93d8', 'pbar4');
      } else if(rank<=6 && !clinchTop6) {
        rows += `<div class="prow"><div style="height:1px;background:rgba(255,255,255,0.06);margin:0"></div></div>`;
        rows += probRow('% to Be in Play-In Tournament',
          'Risk of falling into play-in zone',
          piDisplay, '#dae3f4', 'pbar3');
      }
    }
  } else if(league==='nhl') {
    // [9]=elim, [10]=clinched, [11]=confRank
    const nhlElim = team[9];
    const nhlClinched = team[10];
    const nhlConfRank = team[11];
    rows += probRow('% to Make the Playoffs',
      '',
      odds.mp, oc(odds.mp), 'pbar1', 1, true);
    if(!nhlElim && !nhlClinched) {
      rows += `<div class="prow"><div style="height:1px;background:rgba(255,255,255,0.06);margin:0"></div></div>`;
      rows += probRow('% to Win Division Spot (Top 3 in Division)',
        nhlConfRank<=3?`Division position — currently #${nhlConfRank} in conf`:'Must climb into top 3 of division',
        odds.div, oc(odds.div), 'pbar2', 1, true);
      rows += `<div class="prow"><div style="height:1px;background:rgba(255,255,255,0.06);margin:0"></div></div>`;
      rows += probRow('% to Clinch via Wild Card',
        nhlConfRank<=3?'In via division — wild card not needed':nhlConfRank<=8?'Currently holding a wild card spot':'Must overtake teams above them',
        odds.wc, '#dae3f4', 'pbar3', 1, true);
    }
  } else if(league==='wnba') {
    const cutoff = conf[3][2];
    rows += probRow('% to Make the Playoffs',
      rank<=4?`#${rank} seed — top 4 qualify`:`${cutoff-w} wins back of playoffs`,
      odds.mp, oc(odds.mp), 'pbar1');
  }

  return `<div class="probs">${rows}</div>`;
}

function probRow(lbl, sub, val, color, id, lossFloor=1, isNHL=false) {
  const uncertainty = Math.min(val, 100-val);
  const winDelta  = Math.round(Math.max(1, Math.min(8,  uncertainty * 0.16)));
  const lossDelta = Math.round(Math.max(1, Math.min(12, uncertainty * 0.24)));
  const winImpact  = val===100?100:val===0?0:Math.max(val, Math.min(99, val+winDelta));
  const lossImpact = val===100?100:val===0?0:Math.max(lossFloor, Math.min(val, val-lossDelta));
  return `<div class="prow">
    <div class="plbl">${lbl}</div>
    <div class="psub">${sub}</div>
    <div class="pnum-row"><div></div><div class="pnum" style="color:${color}">${val}%</div></div>
    <div class="ptrack"><div class="pfill" id="${id}" style="background:${color};width:0%"></div></div>
    ${id==='pbar1'?`<div class="winlose">
      <div class="wl" style="background:rgba(161,255,194,0.06);border-color:rgba(0,230,118,.15)">
        <div class="wll" style="color:#a1ffc2">If they win next game</div>
        <div class="wlv" style="color:#a1ffc2">${winImpact}%</div>
      </div>
      <div class="wl" style="background:rgba(255,113,107,0.06);border-color:rgba(255,68,68,.15)">
        <div class="wll" style="color:#ff716b">If they lose next game</div>
        <div class="wlv" style="color:#ff716b">${lossImpact}%</div>
      </div>
    </div>`:''}
  </div>`;
}

          <span class="wppct">${item.aw.toFixed(0)}%</span>

function renderBracket(conf, confName, myAbbr, league) {
  if(league==='nba') {
    // NBA: 1v8tbd, 2v7tbd, 3v6, 4v5
    const pairs = [
      [{s:1,t:conf[0]},{s:'8*',tbd:true}],
      [{s:2,t:conf[1]},{s:'7*',tbd:true}],
      [{s:3,t:conf[2]},{s:6,t:conf[5]}],
      [{s:4,t:conf[3]},{s:5,t:conf[4]}],
    ];
    let html = `<div class="bconf">
      <div class="bconflbl">${confName} — First Round</div>
      <div class="bmatches">`;
    pairs.forEach(([top,bot]) => {
      const youIn = (top.t&&top.t[1]===myAbbr)||(bot.t&&bot.t[1]===myAbbr);
      html += `<div class="bmatch${youIn?' youin':''}${bot.tbd?' tbd':''}">
        <div class="bteam${top.t&&top.t[1]===myAbbr?' highlight':''}">
          <span class="bseed">${top.s}</span>
          <span class="bname" style="color:${top.t&&top.t[1]===myAbbr?'#a1ffc2':top.t?.[8]||'#ecedf6'}">${top.t?.[0].split(' ').slice(-1)[0]||'—'}</span>
          <span class="brec">${top.t?`${top.t[2]}-${top.t[3]}`:''}</span>
        </div>
        <div class="bteam${bot.t&&bot.t[1]===myAbbr?' highlight':''}">
          <span class="bseed">${bot.s}</span>
          ${bot.tbd
            ? `<span class="bname" style="color:#dae3f4">Play-In Winner</span><span class="brec" style="color:#dae3f4">TBD</span>`
            : `<span class="bname" style="color:${bot.t&&bot.t[1]===myAbbr?'#a1ffc2':bot.t?.[8]||'#ecedf6'}">${bot.t?.[0].split(' ').slice(-1)[0]||'—'}</span><span class="brec">${bot.t?`${bot.t[2]}-${bot.t[3]}`:''}</span>`
          }

      </div>`;
    });
    html += `</div></div>`;
    return html;
  }
  if(league==='nhl') {
    // NHL proper seeding:
    // Get divisions in this conference
    const divNames = [...new Set(conf.map(t=>t[13]))];
    
    // Top 3 per division, sorted by points (with tiebreakers: pts, wins, otl)
    const divTeams = {};
    divNames.forEach(div => {
      divTeams[div] = conf.filter(t=>t[13]===div)
        .sort((a,b) => b[2]-a[2] || b[3]-a[3] || a[5]-b[5])
        .slice(0,3);
    });
    
    // Division winners = #1 from each division, sorted by points
    const divWinners = divNames.map(div => divTeams[div][0])
      .sort((a,b) => b[2]-a[2] || b[3]-a[3]);
    const d1 = divWinners[0]; // best division winner
    const d2 = divWinners[1]; // other division winner
    
    // Wild card: best 2 non-top-3 teams by points
    const top3Abbrs = new Set(divNames.flatMap(div => divTeams[div].map(t=>t[1])));
    const wcTeams = conf.filter(t=>!top3Abbrs.has(t[1]))
      .sort((a,b) => b[2]-a[2] || b[3]-a[3])
      .slice(0,2);
    const wc1 = wcTeams[0];
    const wc2 = wcTeams[1];
    
    // Division 2nd and 3rd place
    const d1div = divWinners[0][13];
    const d2div = divWinners[1][13];
    const d1s2 = divTeams[d1div][1];
    const d1s3 = divTeams[d1div][2];
    const d2s2 = divTeams[d2div][1];
    const d2s3 = divTeams[d2div][2];

    // Matchups:
    // D1 (best div winner) vs WC2 (lower WC)
    // D2 (other div winner) vs WC1 (higher WC)
    // D1's 2nd vs D1's 3rd
    // D2's 2nd vs D2's 3rd
    // Determine division abbreviations
    const divAbbr = {};
    divNames.forEach(div => {
      if (div.includes('Atlantic')) divAbbr[div] = 'A';
      else if (div.includes('Metropolitan')) divAbbr[div] = 'M';
      else if (div.includes('Central')) divAbbr[div] = 'C';
      else if (div.includes('Pacific')) divAbbr[div] = 'P';
      else divAbbr[div] = div[0];
    });

    const d1a = divAbbr[d1div];
    const d2a = divAbbr[d2div];

    const matchups = [
      [d1, `${d1a}1`, wc2, 'WC2'],
      [d2, `${d2a}1`, wc1, 'WC1'],
      [d1s2, `${d1a}2`, d1s3, `${d1a}3`],
      [d2s2, `${d2a}2`, d2s3, `${d2a}3`],
    ];

    let html = `<div class="bconf">
      <div class="bconflbl">${confName} — First Round (if playoffs started today)</div>
      <div class="bmatches">`;
    matchups.forEach(([ta, sa, tb, sb]) => {
      if(!ta||!tb) return;
      const youIn = ta[1]===myAbbr||tb[1]===myAbbr;
      html += `<div class="bmatch${youIn?' youin':''}">
        <div class="bteam${ta[1]===myAbbr?' highlight':''}">
          <span class="bseed">${sa}</span>
          <span class="bname" style="color:${ta[1]===myAbbr?'#a1ffc2':ta[8]}">${ta[0].split(' ').slice(-1)[0]}</span>
          <span class="brec">${ta[2]}pts</span>
        </div>
        <div class="bteam${tb[1]===myAbbr?' highlight':''}">
          <span class="bseed">${sb}</span>
          <span class="bname" style="color:${tb[1]===myAbbr?'#a1ffc2':tb[8]}">${tb[0].split(' ').slice(-1)[0]}</span>
          <span class="brec">${tb[2]}pts</span>
        </div>
      </div>`;
    });
    html += `</div></div>`;
    return html;
  }
  if(league==='wnba') {
    const e1=WNBA.east[0],e2=WNBA.east[1],e3=WNBA.east[2],e4=WNBA.east[3];
    const w1=WNBA.west[0],w2=WNBA.west[1],w3=WNBA.west[2],w4=WNBA.west[3];
    const bracket = [[e1,e4],[e2,e3],[w1,w4],[w2,w3]];
    const labels = ['East QF','East QF','West QF','West QF'];
    let html = `<div class="bconf"><div class="bconflbl">WNBA Playoffs — Quarterfinals</div><div class="bmatches">`;
    bracket.forEach(([ta,tb],i) => {
      if(!ta||!tb) return;
      const youIn = ta[1]===myAbbr||tb[1]===myAbbr;
      html += `<div class="bmatch${youIn?' youin':''}">
        <div class="bteam${ta[1]===myAbbr?' highlight':''}">
          <span class="bseed">${['E1','E2','W1','W2'][i]}</span>
          <span class="bname" style="color:${ta[1]===myAbbr?'#a1ffc2':ta[4]}">${ta[0].split(' ').slice(-1)[0]}</span>
          <span class="brec">${ta[2]}-${ta[3]}</span>
        </div>
        <div class="bteam${tb[1]===myAbbr?' highlight':''}">
          <span class="bseed">${['E4','E3','W4','W3'][i]}</span>
          <span class="bname" style="color:${tb[1]===myAbbr?'#a1ffc2':tb[4]}">${tb[0].split(' ').slice(-1)[0]}</span>
          <span class="brec">${tb[2]}-${tb[3]}</span>
        </div>
      </div>`;
    });
    return html+'</div></div>';
  }
  return '';
}

function renderRace(conf, myAbbr, league) {
  if(league==='nhl') return renderRaceNHL(conf, myAbbr);

  let html = '<div class="race">';
  let l6=false, l10=false;
  for(let i=0;i<conf.length;i++) {
    const t=conf[i],rank=i+1,you=t[1]===myAbbr;
    const color=t[league==='wnba'?4:8]||'#555';
    const elim=t[9]||false;
    const inAuto=league==='nba'?rank<=6:rank<=4;
    const inPI=league==='nba'&&rank>=7&&rank<=10;
    if(league==='nba'){
      if(rank===7&&!l6){html+=`<div class="divline autoline"></div>`;l6=true;}
      if(rank===11&&!l10){html+=`<div class="divline piline"></div>`;l10=true;}
    } else if(league==='wnba'&&rank===5&&!l6){html+=`<div class="divline autoline"></div>`;l6=true;}
    const leader = conf[0];
    const gb1 = ((leader[2]-t[2])+(t[3]-leader[3]))/2;
    const gb1Display = gb1===0?'1st':`${gb1%1===0?gb1:gb1.toFixed(1)} GB`;
    const gb1Color = gb1===0?'#a1ffc2':rank<=6?'#a1ffc2':rank<=10?'#dae3f4':'#ff716b';
    const sk=t[7]||'';
    html+=`<div class="rrow${you?' you':inPI?' pi':elim?' out':''}">
      <div class="rrank" style="color:${inAuto?'#a1ffc2':inPI?'#dae3f4':elim?'#ff716b':'#a9abb3'}">${rank}</div>
      <div class="rball" style="border-color:${color};color:${color}">${t[1]}</div>
      <div class="rinfo">
        <div class="rname" style="color:${you?'#a1ffc2':elim?'#a9abb3':'#ecedf6'}">${t[0].split(' ').slice(-1)[0]}</div>
        <div class="rstats">${t[2]}-${t[3]}${sk?` <span style="color:${sk.startsWith('W')?'#a1ffc2':'#ff716b'}">${sk}</span>`:''}</div>

  }
  return html+'</div>';
}

function renderRaceNHL(conf, myAbbr) {
  // Two divisions per conference — show top 3 per division, then wild card section
  const divNames = [...new Set(conf.map(t=>t[13]))];
  const top3Abbrs = new Set(
    divNames.flatMap(div=>conf.filter(t=>t[13]===div).sort((a,b)=>b[2]-a[2]).slice(0,3).map(t=>t[1]))
  );
  const wcTeams = conf.filter(t=>!top3Abbrs.has(t[1])).sort((a,b)=>b[2]-a[2]);
  const wc2pts  = wcTeams[1]?.[2]||0; // wild card #2 cutoff

  let html = '<div class="race" style="padding:6px 10px">';

  divNames.forEach(div => {
    const divTeams = conf.filter(t=>t[13]===div).sort((a,b)=>b[2]-a[2]);
    html += `<div style="font-family:'Manrope',sans-serif;font-size:8px;letter-spacing:.13em;text-transform:uppercase;color:#73757d;padding:7px 2px 3px">${div.toUpperCase()}</div>`;
    divTeams.slice(0,3).forEach((t,di) => {
      const you=t[1]===myAbbr, color=t[8]||'#555', sk=t[7]||'';
      html+=`<div class="rrow${you?' you':''}">
        <div class="rrank" style="color:#a1ffc2">${di+1}</div>
        <div class="rball" style="border-color:${color};color:${color}">${t[1]}</div>
        <div class="rinfo">
          <div class="rname" style="color:${you?'#a1ffc2':'#ecedf6'}">${t[0].split(' ').slice(-1)[0]}</div>
          <div class="rstats">${t[2]}pts · ${t[3]}-${t[4]}${t[5]?'-'+t[5]:''}${sk?` <span style="color:${sk.startsWith('W')?'#a1ffc2':'#ff716b'}">${sk}</span>`:''}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="rwins" style="color:${you?'#a1ffc2':'#ecedf6'}">${t[2]}pts</div>
          <div class="rgap" style="color:#a1ffc2">IN</div>
        </div>
      </div>`;
    });
  });

  // Wild card divider
  html += `<div style="height:1px;background:linear-gradient(90deg,#dae3f4,transparent);margin:6px 0 2px;position:relative">
    <span style="font-family:'Manrope',sans-serif;font-size:7.5px;color:#dae3f4;position:absolute;right:0;top:-8px;letter-spacing:.08em">WILD CARD</span>
  </div>`;

  wcTeams.forEach((t,wi) => {
    const you=t[1]===myAbbr, color=t[8]||'#555', elim=t[9]||false;
    const inWC=wi<2, sk=t[7]||'';
    const gapVsLine = t[2] - wc2pts;
    const gapColor  = inWC?'#a1ffc2':gapVsLine>=0?'#dae3f4':'#ff716b';
    const gapStr    = wi===0?'WC1':wi===1?'WC2':gapVsLine===0?'LINE':(gapVsLine>0?'+'+gapVsLine:''+gapVsLine);
    html+=`<div class="rrow${you?' you':elim?' out':''}">
      <div class="rrank" style="color:${inWC?'#dae3f4':elim?'#ff716b':'#a9abb3'}">${wi+1}</div>
      <div class="rball" style="border-color:${color};color:${color}">${t[1]}</div>
      <div class="rinfo">
        <div class="rname" style="color:${you?'#a1ffc2':elim?'#a9abb3':'#ecedf6'}">${t[0].split(' ').slice(-1)[0]}</div>
        <div class="rstats">${t[2]}pts · ${t[3]}-${t[4]}${t[5]?'-'+t[5]:''}${sk?` <span style="color:${sk.startsWith('W')?'#a1ffc2':'#ff716b'}">${sk}</span>`:''}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="rwins" style="color:${you?'#a1ffc2':elim?'#a9abb3':'#ecedf6'}">${t[2]}pts</div>
        ${elim?`<div class="rgap" style="color:#ff716b">ELIM</div>`:`<div class="rgap" style="color:${gapColor}">${gapStr}</div>`}
      </div>
    </div>`;
  });

  return html+'</div>';
}

const SCENARIO_TEAMS = new Set(['CHA','ORL','PHX','GSW']);

function scenarioGetConf(abbr) {
  return NBA.east.findIndex(t=>t[1]===abbr)>=0 ? NBA.east : NBA.west;
}

function scenarioBuildWants(myAbbr, targetAbbr, gameMode, conf) {
  const wants = {};
  conf.slice(5,10).forEach((t,i) => {
    const seed = i+6;
    const a = t[1];
    if(a === myAbbr) return;
    const isTarget = a === targetAbbr;
    if(gameMode === 'g1') {
      if(seed <= 6)      wants[a] = isTarget ? 'loss' : 'win';
      else if(seed <= 8) wants[a] = isTarget ? 'win'  : 'loss';
      else               wants[a] = isTarget ? 'win'  : 'loss';
    } else {
      if(seed <= 6)      wants[a] = 'win';
      else if(seed <= 8) wants[a] = isTarget ? 'loss' : 'win';
      else               wants[a] = isTarget ? 'win'  : 'loss';
    }
  });
  return wants;
}

function scenarioBuildScenarios(abbr, conf) {
  const isEast = NBA.east.findIndex(t=>t[1]===abbr)>=0;
  const scenarios = [{
    id:'best', label:'Best Playoff Seed',
    desc:'Maximize your overall playoff probability — best possible seeding and matchup path',
    wants:null
  }];
  let opponents = [];
  if(abbr === 'CHA') {
    opponents = [
      {abbr:'TOR',gameMode:'g1',sublabel:'7/8 Game'},
      {abbr:'PHI',gameMode:'g1',sublabel:'7/8 Game'},
      {abbr:'ORL',gameMode:'g1',sublabel:'7/8 Game'},
      {abbr:'MIA',gameMode:'g1',sublabel:'7/8 Game'},
    ];
  } else if(abbr === 'ORL') {
    opponents = [
      {abbr:'TOR',gameMode:'g1',sublabel:'7/8 Game'},
      {abbr:'PHI',gameMode:'g1',sublabel:'7/8 Game'},
      {abbr:'CHA',gameMode:'g1',sublabel:'7/8 Game'},
      {abbr:'MIA',gameMode:'g1',sublabel:'7/8 Game'},
    ];
  } else if(abbr === 'PHX') {
    opponents = [
      {abbr:'POR',gameMode:'g1',sublabel:'7/8 Game'},
      {abbr:'LAC',gameMode:'g1',sublabel:'7/8 Game'},
    ];
  } else if(abbr === 'GSW') {
    opponents = [
      {abbr:'POR',gameMode:'g2',sublabel:'9/10 Game'},
      {abbr:'LAC',gameMode:'g2',sublabel:'9/10 Game'},
    ];
  }
  opponents.forEach(opp => {
    const t = conf.find(x=>x[1]===opp.abbr) || NBA.east.find(x=>x[1]===opp.abbr) || NBA.west.find(x=>x[1]===opp.abbr);
    if(!t) return;
    const tIdx = conf.findIndex(x=>x[1]===opp.abbr);
    const seed = tIdx+1;
    const name = t[0].split(' ').slice(-1)[0];
    let desc;
    if(opp.gameMode === 'g1') {
      if(seed <= 6)      desc = `${opp.abbr} is the ${seed}th seed (auto spot) — needs to drop into the 7/8 zone to face you in Game 1`;
      else if(seed <= 8) desc = `${opp.abbr} is the ${seed}th seed — already in the 7/8 zone, in position to face you in Game 1`;
      else               desc = `${opp.abbr} is the ${seed}th seed — needs to climb into the 7/8 zone to face you in Game 1`;
    } else {
      if(seed <= 8) desc = `${opp.abbr} is the ${seed}th seed — needs to drop into the 9/10 zone to face you in Game 2`;
      else          desc = `${opp.abbr} is the ${seed}th seed — already in the 9/10 zone, in position to face you in Game 2`;
    }
    scenarios.push({
      id:`face_${opp.abbr}`, label:`Face ${name}`, sublabel:opp.sublabel,
      desc, targetOpp:opp.abbr, gameMode:opp.gameMode,
      wants: scenarioBuildWants(abbr, opp.abbr, opp.gameMode, conf)
    });
  });
  return scenarios;
}

function scenarioGetCheerItems(abbr, conf, scenario, today) {
  const myIdx = conf.findIndex(t=>t[1]===abbr);
  const me = conf[myIdx];
  const isWest = NBA.west.findIndex(t=>t[1]===abbr)>=0;
  const items = [];

  // Check if team has a game tonight
  const hasGame = today.some(g => g.h===abbr || g.a===abbr);
  if(!hasGame) {
    items.push({type:'offnight', matchup:'OFF TONIGHT', tag:'OFF NIGHT',
      body:'No game tonight. A loss by any team in the standings above you is worth exactly as much as a win.',
      hw:50, aw:50, h:'', a:'', cheerFor:null});
  }

  today.forEach(g => {
    // Skip MIN games for West teams
    if(isWest && (g.h==='MIN'||g.a==='MIN')) return;
    const matchup = `${g.a} @ ${g.h}`;
    const isMyGame = g.h===abbr||g.a===abbr;

    if(isMyGame) {
      const myWP = g.h===abbr?g.hw:g.aw;
      items.push({
        type:'yourgame', matchup, tag:'YOUR GAME',
        body:`Your win probability: <strong>${myWP}%</strong>. Winning is always the #1 priority — no scenario matters more than this.`,
        hw:g.hw, aw:g.aw, h:g.h, a:g.a, cheerFor:abbr
      });
      return;
    }

    if(scenario.id === 'best') {
      const myRem = me[4] || (82-me[2]-me[3]);
      const rivals = conf.slice(5,10).filter(t=>t[1]!==abbr);
      const homeRival = rivals.find(t=>t[1]===g.h);
      const awayRival = rivals.find(t=>t[1]===g.a);
      const rival = homeRival||awayRival;
      if(!rival) return;
      const rivalAbbr = rival[1];
      const rivalAhead = ((rival[2]-me[2])+(me[3]-rival[3]))/2;
      const tRem = rival[4]||(82-rival[2]-rival[3]);
      // Filter out mathematically irrelevant rivals
      if(rivalAhead > 0 && rivalAhead > tRem) return;  // behind us, can't catch us
      if(rivalAhead < 0 && Math.abs(rivalAhead) > myRem) return; // ahead, we can't catch them
      const otherAbbr = g.h===rivalAbbr?g.a:g.h;
      const rivalWP = g.h===rivalAbbr?g.hw:g.aw;
      const otherWP = 100-rivalWP;
      const rivalRank = conf.findIndex(t=>t[1]===rivalAbbr)+1;
      if(rivalAhead > 0) {
        items.push({type:'cheerfor',matchup,tag:`CHEER FOR ${otherAbbr}`,
          body:`<strong>${rivalAbbr}</strong> (Seed #${rivalRank}) is ${rivalAhead.toFixed(1)} games ahead of you. Root for <strong>${otherAbbr}</strong> — they have a <strong>${otherWP}%</strong> chance.`,
          hw:g.hw,aw:g.aw,h:g.h,a:g.a,cheerFor:otherAbbr});
      } else if(rivalAhead < 0) {
        items.push({type:'cheeragainst',matchup,tag:`ROOT AGAINST ${rivalAbbr}`,
          body:`<strong>${rivalAbbr}</strong> (Seed #${rivalRank}) is ${Math.abs(rivalAhead).toFixed(1)} games behind you — still in reach. Root against them tonight. <strong>${otherAbbr}</strong> has a <strong>${otherWP}%</strong> chance.`,
          hw:g.hw,aw:g.aw,h:g.h,a:g.a,cheerFor:otherAbbr});
      } else {
        items.push({type:'cheerfor',matchup,tag:`CHEER FOR ${otherAbbr}`,
          body:`<strong>${rivalAbbr}</strong> (Seed #${rivalRank}) is tied with you — tiebreakers matter. Root for <strong>${otherAbbr}</strong> — they have a <strong>${otherWP}%</strong> chance.`,
          hw:g.hw,aw:g.aw,h:g.h,a:g.a,cheerFor:otherAbbr});
      }
    } else {
      const wants = scenario.wants||{};
      const homeWant = wants[g.h];
      const awayWant = wants[g.a];
      if(!homeWant && !awayWant) return;
      const pickAbbr = (homeWant&&g.h===scenario.targetOpp)?g.h:(awayWant&&g.a===scenario.targetOpp)?g.a:homeWant?g.h:g.a;
      const pickWant = wants[pickAbbr];
      const pickTeam = conf.find(t=>t[1]===pickAbbr);
      const myRem2 = me[4]||(82-me[2]-me[3]);

      // Skip if this team can't mathematically affect the race
      if(pickTeam) {
        const pickAhead = ((pickTeam[2]-me[2])+(me[3]-pickTeam[3]))/2;
        const pickTRem = pickTeam[4]||(82-pickTeam[2]-pickTeam[3]);
        if(pickAhead > 0 && pickAhead > pickTRem) return;
        if(pickAhead < 0 && Math.abs(pickAhead) > myRem2) return;
      }
      const otherAbbr = g.h===pickAbbr?g.a:g.h;
      const pickWP = g.h===pickAbbr?g.hw:g.aw;
      const otherWP = 100-pickWP;
      const pickRank = conf.findIndex(t=>t[1]===pickAbbr)+1;
      const isTarget = pickAbbr===scenario.targetOpp;
      if(pickWant==='win') {
        const reason = isTarget
          ? `You need <strong>${pickAbbr}</strong> (currently #${pickRank}) in the ${scenario.gameMode==='g1'?'7/8':'9/10'} zone for your desired matchup. Root for them to win.`
          : `You want <strong>${pickAbbr}</strong> (currently #${pickRank}) to stay where they are — out of your path.`;
        items.push({type:'cheerfor',matchup,tag:`CHEER FOR ${pickAbbr}`,
          body:`${reason} They have a <strong>${pickWP}%</strong> chance tonight.`,
          hw:g.hw,aw:g.aw,h:g.h,a:g.a,cheerFor:pickAbbr});
      } else {
        const reason = isTarget
          ? `You need <strong>${pickAbbr}</strong> (currently #${pickRank}) to drop into the ${scenario.gameMode==='g1'?'7/8':'9/10'} zone. Root for <strong>${otherAbbr}</strong> tonight.`
          : `You want <strong>${pickAbbr}</strong> (currently #${pickRank}) to lose — keeps your matchup path clear. Root for <strong>${otherAbbr}</strong>.`;
        items.push({type:'cheeragainst',matchup,tag:`ROOT AGAINST ${pickAbbr}`,
          body:`${reason} <strong>${otherAbbr}</strong> has a <strong>${otherWP}%</strong> chance tonight.`,
          hw:g.hw,aw:g.aw,h:g.h,a:g.a,cheerFor:otherAbbr});
      }
    }
  });

  if(!items.length) {
    items.push({type:'offnight',matchup:'OFF TONIGHT',tag:'OFF NIGHT',
      body:'No game tonight. A loss by any team in the standings above you is worth exactly as much as a win.',
      hw:50,aw:50,h:'',a:'',cheerFor:null});
  }
  return items;
}

          `:''}
          ${league==='nhl'?`
            <div class="flex justify-between items-center py-3">
              <span class="text-xs font-label uppercase text-on-surface-variant">Points</span>
              <span class="font-headline font-bold text-lg text-on-surface">${found[2]}</span>
            </div>
            <div class="flex justify-between items-center py-3">
              <span class="text-xs font-label uppercase text-on-surface-variant">Record</span>
              <span class="font-headline font-bold text-lg text-on-surface-variant">${found[3]}-${found[4]}${found[5]?'-'+found[5]:''}</span>
            </div>
            <div class="flex justify-between items-center py-3">
              <span class="text-xs font-label uppercase text-on-surface-variant">Games remaining</span>
              <span class="font-headline font-bold text-lg text-on-surface-variant">${found[6]}</span>
            </div>
            <div class="flex justify-between items-center py-3">
              <span class="text-xs font-label uppercase text-on-surface-variant">Max possible pts</span>
              <span class="font-headline font-bold text-lg text-on-surface">${found[2]+found[6]*2}</span>
            </div>
            ${!found[9]&&found[11]<=8?`<div class="flex justify-between items-center py-3">
              <span class="text-xs font-label uppercase text-on-surface-variant">Pts ${found[2]>=(conf[7]?.[2]||72)?'above':'back of'} wild card</span>
              <span class="font-headline font-bold text-lg" style="color:${found[2]>=(conf[7]?.[2]||72)?'#a1ffc2':'#ff716b'}">${found[2]>=(conf[7]?.[2]||72)?'+':''}${found[2]-(conf[7]?.[2]||72)}</span>
            </div>`:''}
          `:''}
        </div>
      </div>

    </div>
  </div>`;

  // Set win/loss impact values
  const mpVal = window._display?.mp ?? odds.mp;
  const uncertainty = Math.min(mpVal, 100-mpVal);
  const winDelta = Math.round(Math.max(1, Math.min(8, uncertainty*0.16)));
  const lossDelta = Math.round(Math.max(1, Math.min(12, uncertainty*0.24)));
  const winImpact = mpVal===100?100:mpVal===0?0:Math.max(mpVal,Math.min(99,mpVal+winDelta));
  const lossImpact = mpVal===100?100:mpVal===0?0:Math.max(1,Math.min(mpVal,mpVal-lossDelta));
  const wi = document.getElementById('win-impact');
  const li = document.getElementById('loss-impact');

  // Check if a win tonight clinches top 6 (NBA) or playoffs (NHL)
  if(league==='nba' && wi) {
    const team7 = conf[6];
    const winClinchesTop6 = rank<=6 && team7 && (w+1 >= team7[2]+team7[4]);
    wi.textContent = winClinchesTop6 ? '100% — CLINCHED 🎉' : winImpact+'%';
    wi.style.color = winClinchesTop6 ? '#a1ffc2' : '';
    wi.style.fontSize = winClinchesTop6 ? '10px' : '';
  } else if(league==='nhl' && wi) {
    if(abbr === 'PIT') {
      wi.textContent = '100% — Clinched 🎉';
      wi.style.color = '#a1ffc2';
      wi.style.fontSize = '10px';
    } else {
      wi.textContent = winImpact+'%';
    }
  } else if(wi) {
    wi.textContent = winImpact+'%';
  }
  if(li) li.textContent = lossImpact+'%';

  // Animate probability bars
  setTimeout(()=>{
    const d = window._display || {};
    const b1=document.getElementById('pbar1');
    const b2=document.getElementById('pbar2');
    const b3=document.getElementById('pbar3');
    const b4=document.getElementById('pbar4');
    if(b1) b1.style.width=(league==='nba'?(d.mp??odds.mp):league==='nhl'?odds.mp:odds.mp)+'%';
    if(b2) b2.style.width=(league==='nba'?(d.auto??odds.auto):league==='nhl'?odds.div:odds.mp)+'%';
    if(b3) b3.style.width=(league==='nba'?(d.pi??odds.pi):league==='nhl'?odds.wc:0)+'%';
    if(b4) b4.style.width=(league==='nba'?(d.sp??PLAYIN_SP[found[1]]??odds.sp):0)+'%';
    // Update hero mp display
    const heroMp = document.getElementById('hero-mp');
    if(heroMp) heroMp.textContent = (league==='nba'?(d.mp??odds.mp):odds.mp)+'%';
  },100);
}

// Scenario tab click handler (delegated)
document.addEventListener('click', function(e) {
  const btn = e.target.closest('.sc-tab');
  if(!btn) return;
  const abbr = document.getElementById('tsel').value;
  if(!abbr || !window._scScenarios || !window._scScenarios[abbr]) return;
  const sid = btn.dataset.sid;
  const scenarios = window._scScenarios[abbr];
  const sc = scenarios.find(s=>s.id===sid);
  if(!sc) return;
  window._scActive[abbr] = sc;
  // Update tab styles
  document.querySelectorAll('.sc-tab').forEach(b=>{
    b.style.background='#1c2028'; b.style.color='#a9abb3';
  });
  btn.style.background='#a1ffc2'; btn.style.color='#004627';
  // Update desc
  const descEl = document.getElementById('sc-desc');
  if(descEl) descEl.textContent = sc.desc;
  // Re-render cheer items only
  const listEl = document.getElementById('sc-list');
  if(!listEl) return;
  const conf = CL==='nba'?(NBA.east.findIndex(t=>t[1]===abbr)>=0?NBA.east:NBA.west):null;
  if(!conf) return;
  const today = NBA.today;
  const items = scenarioGetCheerItems(abbr, conf, sc, today);
  listEl.innerHTML = items.map(item => {
    const cf = item.cheerFor;
    const hc = cf===item.h?'#a1ffc2':cf===item.a?'#ff716b':'#555';
    const ac = cf===item.a?'#a1ffc2':cf===item.h?'#ff716b':'#555';
    const bar = item.h?`<div class="wpbar">
      <span class="wpt">${item.a}</span>
      <div class="wptrack"><div class="wpfill" style="width:${item.aw}%;background:${ac}"></div></div>
      <span class="wppct">${item.aw}%</span>
      <span class="wpvs">vs</span>
      <span class="wpt">${item.h}</span>
      <div class="wptrack"><div class="wpfill" style="width:${item.hw}%;background:${hc}"></div></div>
      <span class="wppct">${item.hw}%</span>
    </div>`:'';
    const ico={yourgame:'🏀',cheerfor:'🎯',cheeragainst:'🚫',watch:'👀'}[item.type]||'💤';
    return `<div class="citem ${item.type}">
      <div class="ctop"><span class="cico">${ico}</span><div class="cmatch"><div class="cmatchup">${item.matchup}</div></div><span class="ctag">${item.tag}</span></div>
      <div class="cbody">${item.body}${bar}</div>
    </div>`;
  }).join('');
});

function switchLeague(lg) {
  CL = lg;
  // Update mobile tabs
  document.querySelectorAll('.ltab').forEach(b => {
    b.classList.remove('active','bg-primary','text-on-primary-fixed');
    b.classList.add('bg-surface-container-high','text-on-surface-variant');
  });
  // Update desktop top nav
  document.querySelectorAll('.ltab-top').forEach(b => {
    b.classList.remove('text-primary','font-bold');
    b.classList.add('text-on-surface-variant');
  });
  const activeTop = document.getElementById('ltab-'+lg);
  if(activeTop) {
    activeTop.classList.add('text-primary','font-bold');
    activeTop.classList.remove('text-on-surface-variant');
  }
  // Active mobile tab
  const activeMobile = [...document.querySelectorAll('.ltab')].find(b => b.textContent.trim().toLowerCase()===lg);
  if(activeMobile) {
    activeMobile.classList.add('active','bg-primary','text-on-primary-fixed');
    activeMobile.classList.remove('bg-surface-container-high','text-on-surface-variant');
  }

  // Coming soon leagues
  const comingSoon = {
    wnba: { ico:'🏀', title:'WNBA', msg:'Stats coming after July 19th All-Star Break', color:'#ce93d8' },
    mlb:  { ico:'⚾', title:'MLB',  msg:'Stats coming after July 14th All-Star Break', color:'#dae3f4' },
    nfl:  { ico:'🏈', title:'NFL',  msg:'Stats coming after Week 9',                   color:'#a1ffc2' },
  };

  if(comingSoon[lg]) {
    const { ico, title, msg, color } = comingSoon[lg];
    document.getElementById('tsel').innerHTML = `<option value="">— ${title} not yet active —</option>`;
    document.getElementById('app').innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;min-height:60vh">
        <div style="text-align:center;max-width:480px;padding:40px 24px">
          <div style="font-size:64px;margin-bottom:20px">${ico}</div>
          <div style="font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:800;text-transform:uppercase;letter-spacing:-.02em;color:#ecedf6;margin-bottom:12px">${title} Playoff Tracker</div>
          <div style="font-family:'Manrope',sans-serif;font-size:12px;color:#a9abb3;background:#1c2028;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:14px 20px;margin-bottom:16px;letter-spacing:.04em">${msg}</div>
          <div style="font-size:13px;color:#a9abb3;line-height:1.7">Once the season reaches that point, this tab will automatically activate with full standings, playoff odds, who to cheer for tonight, and the complete bracket picture.</div>
        </div>
      </div>`;
    return;
  }

  buildSel();
  document.getElementById('app').innerHTML = `<div class="empty">
    <div class="eico">${lg==='nba'?'🏀':'🏒'}</div>
    <div class="etitle">Select Your ${lg.toUpperCase()} Team</div>
    <div class="esub">Pick a team to see their full playoff picture.</div>
  </div>`;
}

function buildSel() {
  const sel = document.getElementById('tsel');
  sel.innerHTML = `<option value="">— Select a ${CL.toUpperCase()} team —</option>`;
  let data = {};
  if(CL==='nba') data = {East:NBA.east,West:NBA.west};
  else if(CL==='nhl') data = {East:NHL.east,West:NHL.west};
  else if(CL==='wnba') data = {East:WNBA.east,West:WNBA.west};
  Object.entries(data).forEach(([conf,teams]) => {
    const grp = document.createElement('optgroup');
    grp.label = conf+' Conference';
    [...teams].sort((a,b)=>a[0].localeCompare(b[0])).forEach(t => {
      const o = document.createElement('option');
      o.value = t[1]; o.textContent = t[0];
      grp.appendChild(o);
    });
    sel.appendChild(grp);
  });
}
