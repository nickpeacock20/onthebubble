<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>On The Bubble</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090d;--bg2:#0c0f15;--bg3:#11151d;--card:#141923;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.12);
  --text:#e4ecf7;--text2:#c8d8e8;--text3:#8aa4bc;
  --green:#00e676;--gdim:rgba(0,230,118,.08);
  --red:#ff4444;--rdim:rgba(255,68,68,.08);
  --amber:#ffb300;--adim:rgba(255,179,0,.08);
  --blue:#38b2ff;--bdim:rgba(56,178,255,.08);
  --purple:#a78bfa;--pdim:rgba(167,139,250,.1);
  --accent:#00e5ff;--acdim:rgba(0,229,255,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;gap:12px}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);white-space:nowrap}
.logo span{color:var(--text3);font-weight:400;font-size:11px;margin-left:6px;letter-spacing:.12em}
/* LEAGUE TABS */
.ltabs{display:flex;gap:2px}
.ltab{padding:5px 14px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border:1px solid transparent;border-radius:5px;cursor:pointer;background:none;color:var(--text3);transition:all .15s;white-space:nowrap}
.ltab:hover{color:var(--text2);border-color:var(--border2)}
.ltab.active{background:var(--acdim);border-color:rgba(0,229,255,.25);color:var(--accent)}
.ltab.soon{opacity:.35;cursor:not-allowed;pointer-events:none}
/* TEAM SELECTOR */
.selbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:12px}
.sellbl{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);white-space:nowrap}
.tsel{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;padding:6px 12px;cursor:pointer;flex:1;max-width:280px}
.tsel:focus{outline:none;border-color:var(--accent)}
.livepill{margin-left:auto;display:flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--green);white-space:nowrap;text-align:right}
.livdot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:blink 1.8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
/* MAIN LAYOUT */
.wrap{max-width:1380px;margin:0 auto;padding:18px 20px}
.grid{display:grid;grid-template-columns:1fr 324px;gap:16px}
.lcol,.rcol{display:flex;flex-direction:column;gap:14px}
@media(max-width:1060px){.grid{grid-template-columns:1fr}}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.chdr{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ctitle{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text)}
.csub{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--text2)}
.csub{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--text2)}
/* HERO */
.hero{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 14px;border-bottom:1px solid var(--border)}
.hero-l{display:flex;align-items:center;gap:12px}
.tball{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:900;border:2px solid;flex-shrink:0;letter-spacing:.04em}
.tname{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;letter-spacing:.02em;text-transform:uppercase;line-height:1}
.tmeta{display:flex;align-items:center;gap:7px;margin-top:4px;flex-wrap:wrap}
.seedbadge{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;padding:2px 8px;border-radius:4px}
.streakbadge{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 7px;border-radius:4px}
.hero-r{text-align:right}
.rec{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;line-height:1}
.recmeta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2);margin-top:3px}
/* STATS ROW */
.stats3{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border)}
.s3{padding:12px 14px;text-align:center;border-right:1px solid var(--border)}
.s3:last-child{border-right:none}
.s3v{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;line-height:1}
.s3l{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.1em;color:var(--text2);margin-top:3px;text-transform:uppercase}
/* PROBABILITY BARS */
.probs{padding:14px 18px;display:flex;flex-direction:column;gap:12px}
.prow{display:flex;flex-direction:column;gap:5px}
.prow+.prow{padding-top:12px;border-top:1px solid var(--border)}
.plbl{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text)}
.psub{font-size:11.5px;color:var(--text)}
.pnum-row{display:flex;align-items:baseline;justify-content:space-between}
.pnum{font-family:'Barlow Condensed',sans-serif;font-size:44px;font-weight:900;line-height:1}
.ptrack{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-bottom:8px}
.pfill{height:100%;border-radius:4px;transition:width 1.1s cubic-bezier(.4,0,.2,1)}
.winlose{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.wl{padding:9px 11px;border-radius:7px;border:1px solid}
.wll{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px;color:var(--text2)}
.wlv{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900}
/* CHEER FOR TODAY */
.cheerlist{padding:12px 14px;display:flex;flex-direction:column;gap:7px}
.citem{border-radius:8px;border:1px solid;overflow:hidden}
.citem.yourgame{background:linear-gradient(135deg,var(--acdim),transparent);border-color:rgba(0,229,255,.2)}
.citem.cheerfor{background:linear-gradient(135deg,var(--gdim),transparent);border-color:rgba(0,230,118,.18)}
.citem.cheeragainst{background:linear-gradient(135deg,var(--rdim),transparent);border-color:rgba(255,68,68,.18)}
.citem.watch{background:var(--bg3);border-color:var(--border)}
.citem.offnight{background:var(--bg3);border-color:var(--border)}
.ctop{display:flex;align-items:center;gap:9px;padding:9px 12px}
.cico{font-size:16px;flex-shrink:0}
.cmatch{flex:1}
.cmatchup{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.02em}
.ctime{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--text3);margin-top:1px}
.ctag{font-family:'JetBrains Mono',monospace;font-size:8.5px;padding:3px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0;align-self:flex-start}
.yourgame .ctag{background:rgba(0,229,255,.15);color:var(--accent)}
.cheerfor .ctag{background:rgba(0,230,118,.15);color:var(--green)}
.cheeragainst .ctag{background:rgba(255,68,68,.15);color:var(--red)}
.watch .ctag{background:rgba(56,178,255,.12);color:var(--blue)}
.cbody{padding:0 12px 10px 37px;font-size:12px;color:var(--text);line-height:1.5}
.cbody strong{color:var(--text);font-weight:600}
.wpbar{display:flex;align-items:center;gap:6px;margin-top:5px}
.wpt{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;width:28px;text-transform:uppercase;flex-shrink:0}
.wptrack{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.wpfill{height:100%;border-radius:3px}
.wppct{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--text);width:32px;text-align:right;flex-shrink:0}
.wpvs{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--text2);flex-shrink:0}
/* BRACKET */
.bracket{padding:14px}
.bconf{margin-bottom:16px}
.bconf:last-child{margin-bottom:0}
.bconflbl{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.bmatches{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.bmatch{background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.bmatch.youin{border-color:var(--accent)}
.bmatch.tbd{opacity:.65}
.bteam{display:flex;align-items:center;gap:7px;padding:8px 10px;border-bottom:1px solid var(--border)}
.bteam:last-child{border-bottom:none}
.bteam.highlight{background:var(--acdim)}
.bseed{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--text3);width:14px;text-align:center;flex-shrink:0}
.bname{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;flex:1}
.brec{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--text3)}
/* PLAY-IN */
.piwrap{padding:12px 14px;display:flex;flex-direction:column;gap:7px}
.pigame{background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.pigame.hl{border-color:var(--accent)}
.pigamelbl{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-bottom:1px solid var(--border);background:var(--bg2)}
.pigamelbl-left{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.1em;text-transform:uppercase}
.pigamelbl-right{font-size:11px;color:var(--text2)}
.piteam{display:flex;align-items:center;gap:8px;padding:9px 10px;border-bottom:1px solid var(--border)}
.piteam:last-child{border-bottom:none}
.piteam.you{background:var(--acdim)}
.piseed{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--text3);width:16px;text-align:center}
.piname{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;flex:1}
.piform{font-family:'JetBrains Mono',monospace;font-size:9px;margin-right:5px}
.pipct{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:900}
.paths{padding:10px;border-top:1px solid var(--border)}
.pathlbl{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:7px}
.path{display:flex;align-items:flex-start;gap:8px;padding:7px 9px;border-radius:6px;background:var(--bg2);border:1px solid var(--border);margin-bottom:5px}
.path:last-child{margin-bottom:0}
.pathpct{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;min-width:44px;flex-shrink:0}
.pathdesc{font-size:11.5px;color:var(--text2);line-height:1.5}
.pathdesc strong{color:var(--text)}
/* STANDINGS */
.race{padding:9px 11px;display:flex;flex-direction:column;gap:4px}
.rrow{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:7px;border:1px solid var(--border);background:var(--bg3)}
.rrow.you{border-color:var(--accent);background:var(--acdim)}
.rrow.pi{border-color:rgba(255,179,0,.2);background:rgba(255,179,0,.04)}
.rrow.out{opacity:.45}
.rrank{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--text3);width:18px;text-align:center;flex-shrink:0}
.you .rrank{color:var(--accent)}
.rball{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:7.5px;font-weight:900;border:1.5px solid;flex-shrink:0}
.rinfo{flex:1;min-width:0}
.rname{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rstats{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text2)}
.rwins{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;text-align:right;flex-shrink:0}
.rgap{font-family:'JetBrains Mono',monospace;font-size:9px;text-align:right;flex-shrink:0;min-width:32px}
.divline{height:1px;margin:3px 9px;position:relative}
.autoline{background:linear-gradient(90deg,var(--green),transparent)}
.autoline::after{content:'AUTO';font-family:'JetBrains Mono',monospace;font-size:7.5px;color:var(--green);position:absolute;right:0;top:-8px;letter-spacing:.08em}
.piline{background:linear-gradient(90deg,var(--amber),transparent)}
.piline::after{content:'PLAY-IN';font-family:'JetBrains Mono',monospace;font-size:7.5px;color:var(--amber);position:absolute;right:0;top:-8px;letter-spacing:.08em}
.wcline{background:linear-gradient(90deg,var(--amber),transparent)}
.wcline::after{content:'WILD CARD';font-family:'JetBrains Mono',monospace;font-size:7.5px;color:var(--amber);position:absolute;right:0;top:-8px;letter-spacing:.08em}
/* STORYLINE */
.story{padding:14px 16px}
.storyurg{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.13em;text-transform:uppercase;margin-bottom:5px}
.storyh{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;text-transform:uppercase;letter-spacing:.03em;line-height:1.1;margin-bottom:3px}
.storysub{font-size:11.5px;color:var(--text2);margin-bottom:9px}
.storybody{font-size:12.5px;color:var(--text2);line-height:1.7}
.storybody strong{color:var(--text);font-weight:600}
/* NUMBERS */
.nums{padding:7px 16px}
.nrow{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.nrow:last-child{border-bottom:none}
.nlbl{font-size:12.5px;color:var(--text)}
.nval{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900}
/* SOURCE */
.src{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--text3);padding:7px 16px;border-top:1px solid var(--border);letter-spacing:.04em}
/* EMPTY / PLACEHOLDER */
.empty{text-align:center;padding:70px 24px}
.eico{font-size:44px;margin-bottom:12px}
.etitle{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px}
.esub{font-size:14px;color:var(--text2);line-height:1.6;max-width:460px;margin:0 auto}
.coming{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:60px 40px;text-align:center;margin:20px}
.coming-ico{font-size:52px;margin-bottom:14px}
.coming-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;color:var(--text)}
.coming-sub{font-size:14px;color:var(--text2);line-height:1.6;max-width:400px;margin:0 auto 14px}
.coming-badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;padding:5px 14px;border-radius:4px;background:var(--adim);border:1px solid rgba(255,179,0,.2);color:var(--amber);letter-spacing:.1em}
/* UTILS */
.gg{color:var(--green)}.rr{color:var(--red)}.aa{color:var(--amber)}.bb{color:var(--blue)}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo">ON THE BUBBLE<span>PLAYOFF TRACKER</span></div>
  <nav class="ltabs">
    <button class="ltab active" onclick="switchLeague('nba')">NBA</button>
    <button class="ltab" onclick="switchLeague('nhl')">NHL</button>
    <button class="ltab" onclick="switchLeague('wnba')">WNBA</button>
    <button class="ltab" onclick="switchLeague('mlb')">MLB</button>
    <button class="ltab" onclick="switchLeague('nfl')">NFL</button>
  </nav>
  <div class="livepill"><div class="livdot"></div><div><div>LAST UPDATED MAR 29, 2026</div><div style="font-size:8px;opacity:0.6">Data updates by 10 AM every morning</div></div></div>
</header>

<div class="selbar">
  <span class="sellbl">Your Team</span>
  <select class="tsel" id="tsel" onchange="pick(this.value)">
    <option value="">— Select a team —</option>
  </select>
</div>

<div class="wrap" id="app">
  <div class="empty">
    <div class="eico">🏆</div>
    <div class="etitle">Select Your Team</div>
    <div class="esub">Choose any NBA, NHL, or WNBA team to see their full playoff picture — who to cheer for tonight, odds, bracket, and the storyline of their season.</div>
  </div>
</div>

<script>
// ============================================================
// LIVE DATA ENGINE
// NBA standings: ESPN public API (no CORS)
// NBA H2H + B2B: BallDontLie API (free tier, no CORS)
// NHL: official NHL API (no CORS)
// Monte Carlo: season net rating + home court + B2B + H2H
// ============================================================

let MC_ODDS = { nba: null, nhl: null };
let PLAYIN_SP = {}; // stores exact sp% from play-in bracket simulation
let DATA = {}; // raw data.json payload
let NBA_H2H = {}; // { abbr: { abbr: { wins, games } } }
let NBA_B2B = new Set(); // teams playing tonight on a back-to-back
let NHL_B2B = new Set();

const BDL_KEY = 'cf0cd330-270e-4946-8088-3818a785f31b';
const BDL_HEADERS = { 'Authorization': BDL_KEY };

const TEAM_COLORS = {
  ATL:'#E03A3E',BOS:'#007A33',BKN:'#444444',CHA:'#00788C',CHI:'#CE1141',
  CLE:'#860038',DAL:'#0053BC',DEN:'#FEC524',DET:'#C8102E',GSW:'#1D428A',
  HOU:'#CE1141',IND:'#FDBB30',LAC:'#C8102E',LAL:'#552583',MEM:'#5D76A9',
  MIA:'#98002E',MIL:'#00471B',MIN:'#78BE20',NOP:'#B4975A',NYK:'#006BB6',
  OKC:'#007AC1',ORL:'#0077C0',PHI:'#006BB6',PHX:'#E56020',POR:'#E03A3E',
  SAC:'#5A2D81',SAS:'#C4CED4',TOR:'#CE1141',UTA:'#F9A01B',WAS:'#4A90D9',
  ANA:'#FC4C02',BUF:'#00B2A9',CAR:'#CC0000',CBJ:'#CE1126',CGY:'#C8102E',
  COL:'#6F263D',EDM:'#FF4C00',FLA:'#C8102E',LAK:'#A2AAAD',MTL:'#AF1E2D',
  NJD:'#CE1126',NSH:'#FFB81C',NYI:'#00539B',NYR:'#0038A8',OTT:'#C52032',
  PHI_NHL:'#F74902',PIT:'#FCB514',SEA:'#99D9D9',SJS:'#006D75',STL:'#0038A8',
  TBL:'#0099CC',TOR_NHL:'#003E7E',VAN:'#008852',VGK:'#B4975A',WPG:'#55B7E4',
  WSH:'#C8102E',UTA_NHL:'#71AFE5',DAL_NHL:'#006847',MIN_NHL:'#154734',
};

// ── MONTE CARLO ENGINE ────────────────────────────────────────

function sigmoid(x, d) { return 1 / (1 + Math.exp(-x / d)); }

// NBA win probability
// team[5] = season point differential (net rating from ESPN)
// B2B: if away team on back-to-back, home gets +3.0 instead of +2.5
// H2H: up to 40% weight based on games played between teams
function nbaWinProb(home, away, b2b, h2h) {
  const pd = home[5] - away[5] + (b2b.has(away[1]) ? 3.0 : 2.5);
  const hh = h2h[home[1]]?.[away[1]];
  if (hh && hh.games > 0) {
    const h2hWeight = Math.min(hh.games / 4, 0.40);
    const anrWeight = 1 - h2hWeight;
    return sigmoid(pd, 7) * anrWeight + (hh.wins / hh.games) * h2hWeight;
  }
  return sigmoid(pd, 7);
}

// NHL win probability
// Uses points percentage as base predictor (more directly tied to standings)
// team[2]=pts, team[3]=w, team[4]=l, team[5]=otl, team[6]=rem
// Blends points pct (70%) + L10 GD (30%) for recent form
function nhlWinProb(home, away, b2b, h2h={}) {
  const homePct = home[2] / ((home[3]+home[4]+home[5]+home[6]) * 2 || 1);
  const awayPct = away[2] / ((away[3]+away[4]+away[5]+away[6]) * 2 || 1);
  const homeL10 = (home[16]||0);
  const awayL10 = (away[16]||0);
  const pctDiff = (homePct - awayPct) * 4; // scale to meaningful range
  const l10Diff = (homeL10 - awayL10) * 0.1;
  const pd = pctDiff * 0.8 + l10Diff * 0.2 + (b2b.has(away[1]) ? 0.15 : 0.10);
  const hh = h2h[home[1]]?.[away[1]];
  if (hh && hh.games > 0) {
    const h2hWeight = Math.min(hh.games / 4, 0.25);
    const anrWeight = 1 - h2hWeight;
    return sigmoid(pd, 2.5) * anrWeight + (hh.wins / hh.games) * h2hWeight;
  }
  return sigmoid(pd, 2.5);
}

function simulatePlayIn(s7, s8, s9, s10, b2b, h2h) {
  const p7 = nbaWinProb(s7, s8, b2b, h2h);
  const g1w = Math.random() < p7 ? s7 : s8;
  const g1l = g1w === s7 ? s8 : s7;
  const p9 = nbaWinProb(s9, s10, b2b, h2h);
  const g2w = Math.random() < p9 ? s9 : s10;
  const p3 = nbaWinProb(g1l, g2w, b2b, h2h);
  const g3w = Math.random() < p3 ? g1l : g2w;
  return new Set([g1w[1], g3w[1]]);
}

function runNBAMonteCarlo(east, west, remaining, b2b, h2h, N=5000) {
  const all = [...east, ...west];
  const tm = {}; all.forEach(t => tm[t[1]] = t);
  const counts = {}; all.forEach(t => { counts[t[1]] = {mp:0,top6:0,pi:0,sp:0}; });
  for (let s=0; s<N; s++) {
    const wins = {}; all.forEach(t => { wins[t[1]] = t[2]; });
    for (const g of remaining) {
      if (!tm[g.home] || !tm[g.away]) continue;
      if (Math.random() < nbaWinProb(tm[g.home], tm[g.away], new Set(), h2h)) wins[g.home]++;
      else wins[g.away]++;
    }
    for (const conf of [east, west]) {
      const sorted = [...conf].sort((a,b) => (wins[b[1]]-wins[a[1]]) || (a[3]-b[3]));
      sorted.slice(0,6).forEach(t => { counts[t[1]].top6++; counts[t[1]].mp++; });
      const pi = sorted.slice(6,10);
      pi.forEach(t => counts[t[1]].pi++);
      if (pi.length===4) {
        const winners = simulatePlayIn(pi[0],pi[1],pi[2],pi[3], b2b, h2h);
        pi.forEach(t => { if(winners.has(t[1])){counts[t[1]].sp++;counts[t[1]].mp++;} });
      }
    }
  }
  const odds = {};
  all.forEach(t => {
    const c = counts[t[1]];
    const hardElim = t[9];
    const clinched = t[10];
    // Find conference cutoff (10th seed wins = play-in cutoff)
    const confTeams = east.includes(t) ? east : west;
    const cutoff = confTeams[9]?.[2] || 0;
    const maxWins = t[2] + t[4];
    const mathElim = hardElim || maxWins < cutoff;

    const mp   = Math.round(c.mp/N*100);
    const auto = Math.round(c.top6/N*100);
    const pi   = Math.round(c.pi/N*100);
    const sp   = Math.round(c.sp/N*100);
    odds[t[1]] = {
      mp:   mathElim ? 0 : clinched==='auto' ? 100 : Math.min(99, Math.max(1, mp)),
      auto: mathElim ? 0 : clinched==='auto' ? 100 : Math.min(99, Math.max(mp>0?1:0, auto)),
      pi:   mathElim ? 0 : Math.min(99, Math.max(0, pi)),
      sp:   mathElim ? 0 : Math.min(99, Math.max(0, sp)),
      _rank: confTeams.indexOf(t) + 1,
    };
  });

  // Enforce seed order on play-in survival % — 7 > 8 > 9 > 10
  for (const conf of [east, west]) {
    const pi = conf.slice(6,10).map(t => t[1]).filter(a => odds[a]);
    if (pi.length === 4) {
      const spVals = pi.map(a => odds[a].sp).sort((a,b) => b-a);
      pi.forEach((a,i) => { odds[a].sp = spVals[i]; odds[a].mp = Math.max(odds[a].auto + odds[a].sp * 0.85 / 100, odds[a].mp); });
    }
  }

  return odds;
}

function runNHLMonteCarlo(east, west, remaining, h2h={}, N=5000) {
  const all = [...east, ...west];
  const tm = {}; all.forEach(t => tm[t[1]] = t);
  const counts = {}; all.forEach(t => { counts[t[1]] = {mp:0,div:0,wc:0}; });
  for (let s=0; s<N; s++) {
    const pts = {}; all.forEach(t => { pts[t[1]] = t[2]; });
    for (const g of remaining) {
      if (!tm[g.home] || !tm[g.away]) continue;
      const wp = nhlWinProb(tm[g.home], tm[g.away], new Set(), h2h);
      if (Math.random() < 0.23) {
        // OT/SO — both get 1 pt, winner decided closer to 50/50
        pts[g.home]++; pts[g.away]++;
        if (Math.random() < 0.5 + (wp - 0.5) * 0.3) pts[g.home]++; else pts[g.away]++;
      } else {
        if (Math.random() < wp) pts[g.home]+=2; else pts[g.away]+=2;
      }
    }
    for (const conf of [east, west]) {
      const simWins = {}; conf.forEach(t => { simWins[t[1]] = t[3] + Math.floor((pts[t[1]] - t[2]) / 2); });
      const sorted = [...conf].sort((a,b) => (pts[b[1]]-pts[a[1]]) || (simWins[b[1]]-simWins[a[1]]));
      const divs = {}; sorted.forEach(t => { if(!divs[t[13]])divs[t[13]]=[]; divs[t[13]].push(t[1]); });
      const top3 = new Set(Object.values(divs).flatMap(d => d.slice(0,3)));
      const wc = sorted.filter(t => !top3.has(t[1])).slice(0,2).map(t => t[1]);
      const wcSet = new Set(wc);
      sorted.forEach(t => {
        if (top3.has(t[1])) { counts[t[1]].div++; counts[t[1]].mp++; }
        else if (wcSet.has(t[1])) { counts[t[1]].wc++; counts[t[1]].mp++; }
      });
    }
  }
  const odds = {};
  // Find current playoff cutoff — 8th best record in conference
  const confsSorted = [east, west].map(conf => {
    const divs = {};
    conf.forEach(t => { if(!divs[t[13]])divs[t[13]]=[]; divs[t[13]].push(t); });
    const top3 = new Set(Object.values(divs).flatMap(d => [...d].sort((a,b)=>b[2]-a[2]).slice(0,3).map(t=>t[1])));
    const wc = conf.filter(t=>!top3.has(t[1])).sort((a,b)=>b[2]-a[2]);
    const cutoff = wc[1]?.[2] || 0; // 2nd wild card points
    return { conf, cutoff, top3 };
  });

  all.forEach(t => {
    const c = counts[t[1]];
    const hardElim = t[9];
    const clinched = t[10];

    // Find this team's conference cutoff
    const confData = confsSorted.find(cd => cd.conf.some(x => x[1]===t[1]));
    const cutoff = confData?.cutoff || 0;
    const maxPts = t[2] + (t[6] * 2); // max possible points (2 pts per game)
    const mathElim = hardElim || maxPts < cutoff;

    const mp  = Math.round(c.mp/N*100);
    const div = Math.round(c.div/N*100);
    const wc  = Math.round(c.wc/N*100);
    odds[t[1]] = {
      mp:  mathElim ? 0 : clinched ? 100 : Math.min(99, Math.max(1, mp)),
      div: mathElim ? 0 : clinched==='div' ? 100 : Math.min(99, Math.max(0, div)),
      wc:  mathElim ? 0 : Math.min(99, Math.max(0, wc)),
    };
  });
  return odds;
}

async function fetchLiveData() {
  console.log('[live] Loading data.json...');
  const pill = document.querySelector('.livepill');
  if (pill) pill.innerHTML = `<div class="livdot"></div><div><div>LOADING LIVE DATA...</div><div style="font-size:8px;opacity:0.6">Data updates by 10 AM every morning</div></div>`;

  try {
    const res  = await fetch('/data.json');
    if (!res.ok) throw new Error(`data.json not found (${res.status})`);
    const data = await res.json();
    DATA = data;

    NBA.east  = data.nba.east;
    NBA.west  = data.nba.west;
    NBA.today = data.nba.today;
    NHL.east  = data.nhl.east;
    NHL.west  = data.nhl.west;
    NHL.today = data.nhl.today;

    const h2h    = data.nba.h2h  || {};
    const nbaB2B = new Set(data.nba.b2b || []);
    const nhlB2B = new Set(data.nhl.b2b || []);

    // Re-sort NBA standings by win percentage with H2H tiebreaker
    const nbaSort = (a,b) => {
      const aPct = a[2]/(a[2]+a[3]) || 0;
      const bPct = b[2]/(b[2]+b[3]) || 0;
      if (Math.abs(bPct-aPct) > 0.0001) return bPct-aPct;
      // Tied in pct — use H2H
      const hab = h2h[a[1]]?.[b[1]];
      if (hab && hab.games > 0) return (hab.wins/hab.games) < 0.5 ? 1 : -1;
      return 0;
    };
    NBA.east.sort(nbaSort);
    NBA.west.sort(nbaSort);

    // Compute tonight win probs
    const nbaTM = {}; [...NBA.east,...NBA.west].forEach(t => nbaTM[t[1]]=t);
    NBA.today = NBA.today.map(g => {
      const home=nbaTM[g.h], away=nbaTM[g.a];
      if (!home||!away) return g;
      if (g.hw !== 50) return g;
      const hw = Math.round(nbaWinProb(home, away, nbaB2B, h2h) * 100);
      return {...g, hw, aw: 100-hw};
    });

    const nhlH2H = data.nhl.h2h || {};
    const nhlTM = {}; [...NHL.east,...NHL.west].forEach(t => nhlTM[t[1]]=t);
    NHL.today = NHL.today.map(g => {
      const home=nhlTM[g.h], away=nhlTM[g.a];
      if (!home||!away) return g;
      const hw = Math.round(nhlWinProb(home, away, nhlB2B, nhlH2H) * 100);
      return {...g, hw, aw: 100-hw};
    });

    // Run Monte Carlo
    console.log('[live] Running Monte Carlo...');
    MC_ODDS.nba = runNBAMonteCarlo(NBA.east, NBA.west, data.nba.remaining||[], nbaB2B, h2h, 20000);
    MC_ODDS.nhl = runNHLMonteCarlo(NHL.east, NHL.west, data.nhl.remaining||[], nhlH2H, 20000);

    console.log('[live] Done.');

    // Pre-calculate play-in sp% for both conferences
    for (const conf of [NBA.east, NBA.west]) {
      const s7=conf[6],s8=conf[7],s9=conf[8],s10=conf[9];
      if (!s7||!s8||!s9||!s10) continue;
      let r7=0,r8=0,r9=0,r10=0;
      const PN = 10000;
      for (let i=0; i<PN; i++) {
        const g1win7 = Math.random() < nbaWinProb(s7, s8, nbaB2B, h2h);
        const g1loser = g1win7 ? s8 : s7;
        const g2win9 = Math.random() < nbaWinProb(s9, s10, nbaB2B, h2h);
        const g2winner = g2win9 ? s9 : s10;
        const g3winLoser = Math.random() < nbaWinProb(g1loser, g2winner, nbaB2B, h2h);
        const seed8 = g3winLoser ? g1loser : g2winner;
        if (g1win7) r7++; else r8++;
        if (seed8===s7) r7++; else if (seed8===s8) r8++; else if (seed8===s9) r9++; else r10++;
      }
      PLAYIN_SP[s7[1]]=Math.round(r7/PN*100);
      PLAYIN_SP[s8[1]]=Math.round(r8/PN*100);
      PLAYIN_SP[s9[1]]=Math.round(r9/PN*100);
      PLAYIN_SP[s10[1]]=Math.round(r10/PN*100);
    }

    const updated = new Date(data.updatedAt).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',timeZone:'America/New_York'});
    if (pill) pill.innerHTML = `<div class="livdot"></div><div><div>LAST UPDATED ${updated.toUpperCase()}</div><div style="font-size:8px;opacity:0.6">Data updates by 10 AM every morning</div></div>`;

  } catch(err) {
    console.warn('[live] Could not load data.json:', err.message);
    if (pill) pill.innerHTML = `<div class="livdot" style="background:var(--amber)"></div><div><div>CACHED DATA</div><div style="font-size:8px;opacity:0.6">Data updates by 10 AM every morning</div></div>`;
  }

  const sel = document.getElementById('tsel');
  buildSel();
  if (sel?.value) pick(sel.value);
  else setTimeout(()=>{ sel.value='MIA'; pick('MIA'); }, 150);
}

// ============================================================
// PLAYOFF ODDS — formula-based, honest
// Hard elimination: 0% if max wins < cutoff, always
// Note: backend Monte Carlo simulation replaces these nightly
// when deployed (see backend guide)
// ============================================================
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}

function nbaOdds(team, rank, conf) {
  // Use Monte Carlo odds if available
  if (MC_ODDS.nba?.[team[1]]) return MC_ODDS.nba[team[1]];

  const [,, w, l, rem,,,,, elim, clinched] = team;
  const cutoff  = conf[9][2];
  const cutoff6 = conf[5][2];
  // Hard eliminated
  if(elim || w+rem < cutoff) return {mp:0,auto:0,pi:0,sp:0};
  // Clinched auto playoff spot — 100% everything, win or lose doesn't matter
  if(clinched === 'auto') return {mp:100,auto:100,pi:0,sp:0};
  // Clinched play-in spot — 100% to make play-in, fighting for seeding
  if(clinched === 'pi') {
    const gap6 = w - cutoff6;
    const auto_ = clamp(80 + gap6*5, 40, 97);
    return {mp:100,auto:Math.round(auto_),pi:Math.round(100-auto_),sp:0};
  }
  const gap10 = w - cutoff;
  const gap6  = w - cutoff6;
  let mp, auto_, pi_, sp_;
  if(rank<=6) {
    auto_ = clamp(80 + gap6*5, 40, 97);
    pi_   = clamp(20 - gap6*5, 2, 55);
    mp    = clamp(auto_ + pi_*0.4, auto_, 99);
    sp_   = 0;
  } else if(rank<=10) {
    auto_ = clamp(15 + gap10*8, 1, 45);
    pi_   = clamp(80 - Math.abs(gap10)*5, 30, 97);
    const piBase = {7:62,8:52,9:36,10:28}[rank]||40;
    sp_   = clamp(piBase + gap10*3, 5, 80);
    mp    = clamp(auto_ + sp_*0.85, 1, 90);
  } else {
    const deficit = cutoff - w;
    if(w+rem < cutoff) return {mp:0,auto:0,pi:0,sp:0};
    mp    = clamp(25 - deficit*7, 1, 35);
    auto_ = clamp(5  - deficit*3, 0, 15);
    pi_   = clamp(30 - deficit*7, 2, 40);
    sp_   = 0;
  }
  return {mp:Math.round(mp), auto:Math.round(auto_), pi:Math.round(pi_), sp:Math.round(sp_)};
}

function nhlOdds(team, rank) {
  // Use Monte Carlo odds if available
  if (MC_ODDS.nhl?.[team[1]]) return MC_ODDS.nhl[team[1]];

  // [0]name,[1]abbr,[2]pts,[3]w,[4]l,[5]otl,[6]rem,[7]streak,[8]color,[9]elim,[10]clinched,[11]confRank,[12]divRank,[13]div
  const pts = team[2], w = team[3], l = team[4], otl = team[5], rem = team[6];
  const elim = team[9], clinched = team[10], confRank = team[11];
  if(elim) return {mp:0,div:0,wc:0};
  if(clinched==='div') return {mp:100,div:100,wc:0};
  if(clinched==='playoff') return {mp:100,div:50,wc:50};
  const maxPts = pts + rem*2;
  const wcCutoff = 94; // approx wild card cutoff
  if(maxPts < wcCutoff - 8) return {mp:0,div:0,wc:0};
  const above = pts - wcCutoff;
  let mp, div_, wc_;
  if(confRank <= 3) { // division top 3 — in on division
    mp   = clamp(80 + above*1.5, 45, 98);
    div_ = clamp(75 + above*2, 30, 98);
    wc_  = 0;
  } else if(confRank <= 8) { // wild card position
    mp   = clamp(60 + above*3, 15, 95);
    div_ = clamp(20 + above*2, 2, 55);
    wc_  = clamp(55 + above*3, 10, 90);
  } else { // outside
    mp   = clamp(30 + above*4, 2, 65);
    div_ = clamp(5  + above*2, 0, 25);
    wc_  = clamp(25 + above*4, 2, 60);
  }
  return {mp:Math.round(mp), div:Math.round(div_), wc:Math.round(wc_)};
}

function wnbaOdds(team, rank, conf) {
  const [,,w,l] = team;
  const cutoff4 = conf[3][2];
  const cutoff5 = conf[4]?.[2]||0;
  const rem = 44-w-l;
  if(rank<=4) {
    const cushion = w-cutoff5;
    const base = clamp(70+cushion*9, 30, 97);
    return {mp:base};
  }
  const deficit = cutoff4-w;
  if(w+rem < cutoff4) return {mp:0};
  return {mp:clamp(35-deficit*9, 1, 50)};
}

function getCheerItems(teamAbbr, conf, rank, todayGames, league) {
  const items = [];
  const myIdx = rank - 1;
  const myW   = conf[myIdx][2];  // wins (NBA/WNBA) or pts (NHL)
  const myRem = league==='nhl' ? conf[myIdx][6] : (conf[myIdx][4] || (82 - conf[myIdx][2] - conf[myIdx][3]));
  const playinCutoff = league==='nba' ? conf[9][2] : 0;

  // ── STEP 1: My own game first, always ──────────────────────
  const myGame = todayGames.find(g => g.h===teamAbbr || g.a===teamAbbr);
  const gameIco = league==='nhl' ? '🏒' : '🏀';
  if(myGame) {
    const myWP = myGame.h===teamAbbr ? myGame.hw : myGame.aw;
    items.push({
      type:'yourgame', ico: gameIco,
      matchup:`${myGame.a} @ ${myGame.h}`, time:myGame.t,
      tag:'YOUR GAME',
      body:`Your win probability: <strong>${myWP.toFixed(0)}%</strong>. Winning tonight is the #1 priority.`,
      hw:myGame.hw, aw:myGame.aw, home:myGame.h, away:myGame.a, cheerFor:null, cheerAgainst:null
    });
  } else {
    items.push({
      type:'watch', ico:'💤',
      matchup:'OFF TONIGHT', time:'No game', tag:'OFF NIGHT',
      body:`No game tonight. A loss by any team in the standings above you is worth exactly as much as a win.`,
      hw:50, aw:50, home:'', away:'', cheerFor:null, cheerAgainst:null
    });
  }

  // ── STEP 2: Every other relevant team in the conference ─────
  // Logic: we want EVERY relevant team to LOSE.
  // Root for whoever is playing them. Period.
  // Relevant = not eliminated, mathematically can still affect the race.
  // Sort by closest gap = most urgent first.
  // If two rivals share a game, show it once for the more urgent one.

  const bucket = [];   // one entry per relevant team with a game tonight
  const shownGames = new Set();

  conf.forEach(t => {
    if(t[1] === teamAbbr) return;

    // Elimination check
    if(t[9]) return;

    // NBA: skip teams that can't reach play-in or can't affect us
    if(league==='nba') {
      const tMax = t[2] + (t[4] || (82-t[2]-t[3]));
      if(tMax < playinCutoff) return;
    }

    // NHL: determine relevance based on division top 3 + wild card race
    if(league==='nhl') {
      const myTeamData = conf[myIdx];
      const myDiv = myTeamData[13];
      const tDiv  = t[13];
      const myDivRank = myTeamData[12];
      const tDivRank  = t[12];
      const myConfRank = myTeamData[11];
      const tConfRank  = t[11];

      // Only relevant if:
      // 1. Same division and both near the top 3 cutoff
      // 2. Both in wild card race (conf rank 3-6 range fighting for WC spots)
      const sameDivRace = myDiv === tDiv && (myDivRank <= 4 || tDivRank <= 4);
      const wcRace = myConfRank > 3 && tConfRank > 3; // both outside div leaders fighting for WC
      const chasingDiv = myDiv !== tDiv && tDivRank <= 3 && myConfRank <= 6; // we're chasing a div leader for WC
      if(!sameDivRace && !wcRace && !chasingDiv) return;
    }

    // True games back
    const myTeam = conf[myIdx];
    const gap = league==='nhl'
      ? myW - t[2]
      : ((myTeam[2] - t[2]) + (t[3] - myTeam[3])) / 2;
    const absGap = Math.abs(gap);

    const tRem = league==='nhl' ? t[6] : (t[4] || (82-t[2]-t[3]));
    if(gap > 0 && gap > tRem*2) return;
    if(gap < 0 && absGap > myRem*2) return;
    if(absGap > (league==='nhl' ? 10 : 6)) return;

    // Find their game tonight — not involving us
    const g = todayGames.find(g2 =>
      (g2.h===t[1] || g2.a===t[1]) &&
      g2.h !== teamAbbr && g2.a !== teamAbbr
    );
    if(!g) return;

    bucket.push({ t, gap, absGap, g });
  });

  // Sort by urgency: smallest gap first
  bucket.sort((a,b) => a.absGap - b.absGap);

  // Build items, deduplicating games
  bucket.forEach(({ t, gap, absGap, g }) => {
    const rv      = t[1];
    const gameKey = `${g.h}-${g.a}`;

    // If this game is already shown, skip (the more urgent rival already claimed it)
    if(shownGames.has(gameKey)) return;
    shownGames.add(gameKey);

    // opp = whoever is NOT the team we want to lose
    // We always want `rv` to lose, so we root for the other team
    const opp   = g.h===rv ? g.a  : g.h;
    const oppWP = g.h===rv ? g.aw : g.hw;
    const units = absGap===1 ? 'win' : (league==='nhl' ? 'pts' : 'wins');

    if(gap <= 0) {
      // rv is AHEAD of us (or tied) — we want them to LOSE, root for opp
      const desc = gap===0
        ? `tied with you — tiebreakers decide seeding`
        : `${absGap} ${units} ahead of you`;
      items.push({
        type:'cheerfor', ico:'🎯',
        matchup:`${g.a} @ ${g.h}`, time:g.t,
        tag:`CHEER FOR ${opp}`,
        body:`<strong>${rv}</strong> is ${desc}. <strong class="gg">Root for ${opp} tonight.</strong> They have a <strong>${oppWP.toFixed(0)}%</strong> chance.${gap<0?' A '+rv+' loss + your win = a 2-game swing.':''}`,
        hw:g.hw, aw:g.aw, home:g.h, away:g.a, cheerFor:opp, cheerAgainst:rv
      });
    } else {
      // rv is BEHIND us — we want them to LOSE to protect our lead, root for opp
      items.push({
        type:'cheeragainst', ico:'🛡️',
        matchup:`${g.a} @ ${g.h}`, time:g.t,
        tag:`PROTECT YOUR SPOT`,
        body:`<strong>${rv}</strong> is ${absGap} ${units} behind you and still in range. <strong class="gg">Root for ${opp}</strong> to keep them there. They have a <strong>${oppWP.toFixed(0)}%</strong> chance.`,
        hw:g.hw, aw:g.aw, home:g.h, away:g.a, cheerFor:opp, cheerAgainst:rv
      });
    }
  });

  return items.slice(0, 8);
}

    const units = absGap===1?'win':(league==='nhl'?'pts':'wins');
    const rvLost = g.winner !== rv;

    if (gap <= 0) {
      // rv is ahead — we wanted them to lose
      items.push({

      b:`<strong>${name}</strong> are in wild card position at ${pts} points.${ptsBack<=4?` Only <strong>${Math.abs(ptsBack)} pts</strong> separate them from the bubble — this race is tight.`:''}${cold?` <strong class="rr">The ${streakN}-game losing streak is a serious threat to this position.</strong>`:hot?` A <strong class="gg">${streakN}-game win streak</strong> has them moving in the right direction.`:''}`};
    return {urg:'red',h:'Chasing the Wild Card',sub:`Conf #${rank} · ${Math.abs(ptsBack)} pts back`,
      b:`<strong>${name}</strong> are outside the playoff picture at ${pts} points with ${rem} games left. They need to win and get help ahead of them.${cold?` <strong class="rr">The ${streakN}-game skid makes this an uphill battle.</strong>`:''}`};
  }

  if(league==='wnba') {
    const [,,w,l] = team;
    const cutoff = conf[3][2];
    if(rank<=4) {
      const cushion = w-(conf[4]?.[2]||0);
      return {urg:cushion>=4?'green':'amber',h:cushion>=4?'Secure in Playoffs':'Holding On',
        sub:`#${rank} seed · ${cushion}-win cushion`,
        b:`<strong>${name}</strong> hold the #${rank} seed with a ${cushion}-win cushion over 5th place.${cushion<=2?` The margin is thin in a 44-game season.`:''}`};
    }
    const deficit = cutoff-w;
    return {urg:'red',h:'Outside the Playoffs',sub:`${deficit} win${deficit!==1?'s':''} back`,
      b:`<strong>${name}</strong> are ${deficit} win${deficit!==1?'s':''} outside the playoff picture with ${44-w-l} games remaining.`};
  }
  
  return {urg:'dim',h:'—',sub:'',b:''};
}

function renderProbs(odds, team, rank, league, conf) {
  // NBA:  [0]name,[1]abbr,[2]w,[3]l,[4]rem,[5]diff,[6]l10w,[7]streak,[8]color,[9]elim,[10]clinched
  // NHL:  [0]name,[1]abbr,[2]pts,[3]w,[4]l,[5]otl,[6]rem,[7]streak,[8]color,[9]elim,[10]clinched,[11]confRank
  // WNBA: [0]name,[1]abbr,[2]w,[3]l,[4]color
  const w   = league==='nhl' ? team[3] : team[2];
  const l   = league==='nhl' ? team[4] : team[3];
  const rem = league==='nhl' ? team[6] : (league==='wnba' ? 44-team[2]-team[3] : team[4]);
  const oc = c => c>60?'var(--green)':c>30?'var(--amber)':'var(--red)';
  let rows = '';

  if(league==='nba') {
    const cutoff  = conf[9][2];
    const cutoff6 = conf[5][2];
    const isElim  = team[9] || w+rem<cutoff;
    
    rows += probRow('% to Make the Playoffs',
      '',
      odds.mp, oc(odds.mp), 'pbar1');
    
    if(!isElim) {
      rows += `<div class="prow"><div style="height:1px;background:var(--border);margin:0"></div></div>`;
      rows += probRow('% to Clinch Guaranteed Spot (Top 6)',
        rank<=6?`Currently #${rank} — defending auto spot`:`${Math.abs(w-cutoff6)} wins ${w>=cutoff6?'above':'back of'} the auto line`,
        odds.auto, oc(odds.auto), 'pbar2');
      
      rows += `<div class="prow"><div style="height:1px;background:var(--border);margin:0"></div></div>`;
      rows += probRow('% to Be in Play-In Tournament',
        rank<=6?'Risk of falling into play-in zone':rank<=10?`Currently the #${rank} seed in play-in`:'Must reach top 10 first',
        odds.pi, 'var(--amber)', 'pbar3');
      
      if(rank>=7 && rank<=10) {
        rows += `<div class="prow"><div style="height:1px;background:var(--border);margin:0"></div></div>`;
        const spVal = PLAYIN_SP[team[1]] ?? odds.sp;
        rows += probRow('% to Survive Play-In Tournament',
          rank===7?'1 win needed — best path':rank===8?'Win G1 or survive G3':'Must win 2 consecutive games',
          spVal, 'var(--purple)', 'pbar4');
      }
      // Win/loss impact only for the main bar
    }
  } else if(league==='nhl') {
    // [9]=elim, [10]=clinched, [11]=confRank
    const nhlElim = team[9];
    const nhlClinched = team[10];
    const nhlConfRank = team[11];
    rows += probRow('% to Make the Playoffs',
      '',
      odds.mp, oc(odds.mp), 'pbar1');
    if(!nhlElim && !nhlClinched) {
      rows += `<div class="prow"><div style="height:1px;background:var(--border);margin:0"></div></div>`;
      rows += probRow('% to Win Division Spot (Top 3 in Division)',
        nhlConfRank<=3?`Division position — currently #${nhlConfRank} in conf`:'Must climb into top 3 of division',
        odds.div, oc(odds.div), 'pbar2');
      rows += `<div class="prow"><div style="height:1px;background:var(--border);margin:0"></div></div>`;
      rows += probRow('% to Clinch via Wild Card',
        nhlConfRank<=3?'In via division — wild card not needed':nhlConfRank<=8?'Currently holding a wild card spot':'Must overtake teams above them',
        odds.wc, 'var(--amber)', 'pbar3');
    }
  } else if(league==='wnba') {
    const cutoff = conf[3][2];
    rows += probRow('% to Make the Playoffs',
      rank<=4?`#${rank} seed — top 4 qualify`:`${cutoff-w} wins back of playoffs`,
      odds.mp, oc(odds.mp), 'pbar1');
  }

  return `<div class="probs">${rows}</div>`;
}

function probRow(lbl, sub, val, color, id) {
  const winImpact  = val===100?100:val===0?0:Math.max(val, Math.min(99, val+8));
  const lossImpact = val===100?100:val===0?0:Math.max(1, Math.min(val, val-15));
  return `<div class="prow">
    <div class="plbl">${lbl}</div>
    <div class="psub">${sub}</div>
    <div class="pnum-row"><div></div><div class="pnum" style="color:${color}">${val}%</div></div>
    <div class="ptrack"><div class="pfill" id="${id}" style="background:${color};width:0%"></div></div>
    ${id==='pbar1'?`<div class="winlose">
      <div class="wl" style="background:var(--gdim);border-color:rgba(0,230,118,.15)">
        <div class="wll" style="color:var(--green)">If they win next game</div>
        <div class="wlv" style="color:var(--green)">${winImpact}%</div>
      </div>
      <div class="wl" style="background:var(--rdim);border-color:rgba(255,68,68,.15)">
        <div class="wll" style="color:var(--red)">If they lose next game</div>
        <div class="wlv" style="color:var(--red)">${lossImpact}%</div>
      </div>
    </div>`:''}
  </div>`;
}

function renderBracket(conf, confName, myAbbr, league) {
  if(league==='nba') {
    // NBA: 1v8tbd, 2v7tbd, 3v6, 4v5
    const pairs = [
      [{s:1,t:conf[0]},{s:'8*',tbd:true}],
      [{s:2,t:conf[1]},{s:'7*',tbd:true}],
      [{s:3,t:conf[2]},{s:6,t:conf[5]}],
      [{s:4,t:conf[3]},{s:5,t:conf[4]}],
    ];
    let html = `<div class="bconf">
      <div class="bconflbl">${confName} — First Round</div>
      <div class="bmatches">`;
    pairs.forEach(([top,bot]) => {
      const youIn = (top.t&&top.t[1]===myAbbr)||(bot.t&&bot.t[1]===myAbbr);
      html += `<div class="bmatch${youIn?' youin':''}${bot.tbd?' tbd':''}">
        <div class="bteam${top.t&&top.t[1]===myAbbr?' highlight':''}">
          <span class="bseed">${top.s}</span>
          <span class="bname" style="color:${top.t&&top.t[1]===myAbbr?'var(--accent)':top.t?.[8]||'var(--text)'}">${top.t?.[0].split(' ').slice(-1)[0]||'—'}</span>
          <span class="brec">${top.t?`${top.t[2]}-${top.t[3]}`:''}</span>
        </div>
        <div class="bteam${bot.t&&bot.t[1]===myAbbr?' highlight':''}">
          <span class="bseed">${bot.s}</span>
          ${bot.tbd
            ? `<span class="bname" style="color:var(--amber)">Play-In Winner</span><span class="brec" style="color:var(--amber)">TBD</span>`
            : `<span class="bname" style="color:${bot.t&&bot.t[1]===myAbbr?'var(--accent)':bot.t?.[8]||'var(--text)'}">${bot.t?.[0].split(' ').slice(-1)[0]||'—'}</span><span class="brec">${bot.t?`${bot.t[2]}-${bot.t[3]}`:''}</span>`
          }
        </div>
      </div>`;
    });
    html += `</div></div>`;
    return html;
  }
  if(league==='nhl') {
    // NHL proper seeding:
    // Get divisions in this conference
    const divNames = [...new Set(conf.map(t=>t[13]))];
    
    // Top 3 per division, sorted by points (with tiebreakers: pts, wins, otl)
    const divTeams = {};
    divNames.forEach(div => {
      divTeams[div] = conf.filter(t=>t[13]===div)
        .sort((a,b) => b[2]-a[2] || b[3]-a[3] || a[5]-b[5])
        .slice(0,3);
    });
    
    // Division winners = #1 from each division, sorted by points
    const divWinners = divNames.map(div => divTeams[div][0])
      .sort((a,b) => b[2]-a[2] || b[3]-a[3]);
    const d1 = divWinners[0]; // best division winner
    const d2 = divWinners[1]; // other division winner
    
    // Wild card: best 2 non-top-3 teams by points
    const top3Abbrs = new Set(divNames.flatMap(div => divTeams[div].map(t=>t[1])));
    const wcTeams = conf.filter(t=>!top3Abbrs.has(t[1]))
      .sort((a,b) => b[2]-a[2] || b[3]-a[3])
      .slice(0,2);
    const wc1 = wcTeams[0];
    const wc2 = wcTeams[1];
    
    // Division 2nd and 3rd place
    const d1div = divWinners[0][13];
    const d2div = divWinners[1][13];
    const d1s2 = divTeams[d1div][1];
    const d1s3 = divTeams[d1div][2];
    const d2s2 = divTeams[d2div][1];
    const d2s3 = divTeams[d2div][2];

    // Matchups:
    // D1 (best div winner) vs WC2 (lower WC)
    // D2 (other div winner) vs WC1 (higher WC)
    // D1's 2nd vs D1's 3rd
    // D2's 2nd vs D2's 3rd
    // Determine division abbreviations
    const divAbbr = {};
    divNames.forEach(div => {
      if (div.includes('Atlantic')) divAbbr[div] = 'A';
      else if (div.includes('Metropolitan')) divAbbr[div] = 'M';
      else if (div.includes('Central')) divAbbr[div] = 'C';
      else if (div.includes('Pacific')) divAbbr[div] = 'P';
      else divAbbr[div] = div[0];
    });

    const d1a = divAbbr[d1div];
    const d2a = divAbbr[d2div];

    const matchups = [
      [d1, `${d1a}1`, wc2, 'WC2'],
      [d2, `${d2a}1`, wc1, 'WC1'],
      [d1s2, `${d1a}2`, d1s3, `${d1a}3`],
      [d2s2, `${d2a}2`, d2s3, `${d2a}3`],
    ];

    let html = `<div class="bconf">
      <div class="bconflbl">${confName} — First Round (if playoffs started today)</div>
      <div class="bmatches">`;
    matchups.forEach(([ta, sa, tb, sb]) => {
      if(!ta||!tb) return;
      const youIn = ta[1]===myAbbr||tb[1]===myAbbr;
      html += `<div class="bmatch${youIn?' youin':''}">
        <div class="bteam${ta[1]===myAbbr?' highlight':''}">
          <span class="bseed">${sa}</span>
          <span class="bname" style="color:${ta[1]===myAbbr?'var(--accent)':ta[8]}">${ta[0].split(' ').slice(-1)[0]}</span>
          <span class="brec">${ta[2]}pts</span>
        </div>
        <div class="bteam${tb[1]===myAbbr?' highlight':''}">
          <span class="bseed">${sb}</span>
          <span class="bname" style="color:${tb[1]===myAbbr?'var(--accent)':tb[8]}">${tb[0].split(' ').slice(-1)[0]}</span>
          <span class="brec">${tb[2]}pts</span>
        </div>
      </div>`;
    });
    html += `</div></div>`;
    return html;
  }
  if(league==='wnba') {
    const e1=WNBA.east[0],e2=WNBA.east[1],e3=WNBA.east[2],e4=WNBA.east[3];
    const w1=WNBA.west[0],w2=WNBA.west[1],w3=WNBA.west[2],w4=WNBA.west[3];
    const bracket = [[e1,e4],[e2,e3],[w1,w4],[w2,w3]];
    const labels = ['East QF','East QF','West QF','West QF'];
    let html = `<div class="bconf"><div class="bconflbl">WNBA Playoffs — Quarterfinals</div><div class="bmatches">`;
    bracket.forEach(([ta,tb],i) => {
      if(!ta||!tb) return;
      const youIn = ta[1]===myAbbr||tb[1]===myAbbr;
      html += `<div class="bmatch${youIn?' youin':''}">
        <div class="bteam${ta[1]===myAbbr?' highlight':''}">
          <span class="bseed">${['E1','E2','W1','W2'][i]}</span>
          <span class="bname" style="color:${ta[1]===myAbbr?'var(--accent)':ta[4]}">${ta[0].split(' ').slice(-1)[0]}</span>
          <span class="brec">${ta[2]}-${ta[3]}</span>
        </div>
        <div class="bteam${tb[1]===myAbbr?' highlight':''}">
          <span class="bseed">${['E4','E3','W4','W3'][i]}</span>
          <span class="bname" style="color:${tb[1]===myAbbr?'var(--accent)':tb[4]}">${tb[0].split(' ').slice(-1)[0]}</span>
          <span class="brec">${tb[2]}-${tb[3]}</span>
        </div>
      </div>`;
    });
    return html+'</div></div>';
  }
  return '';
}

function renderRace(conf, myAbbr, league) {
  if(league==='nhl') return renderRaceNHL(conf, myAbbr);

  let html = '<div class="race">';
  let l6=false, l10=false;
  for(let i=0;i<conf.length;i++) {
    const t=conf[i],rank=i+1,you=t[1]===myAbbr;
    const color=t[league==='wnba'?4:8]||'#555';
    const elim=t[9]||false;
    const inAuto=league==='nba'?rank<=6:rank<=4;
    const inPI=league==='nba'&&rank>=7&&rank<=10;
    if(league==='nba'){
      if(rank===7&&!l6){html+=`<div class="divline autoline"></div>`;l6=true;}
      if(rank===11&&!l10){html+=`<div class="divline piline"></div>`;l10=true;}
    } else if(league==='wnba'&&rank===5&&!l6){html+=`<div class="divline autoline"></div>`;l6=true;}
    const leader = conf[0];
    const gb1 = ((leader[2]-t[2])+(t[3]-leader[3]))/2;
    const gb1Display = gb1===0?'1st':`${gb1%1===0?gb1:gb1.toFixed(1)} GB`;
    const gb1Color = gb1===0?'var(--green)':rank<=6?'var(--green)':rank<=10?'var(--amber)':'var(--red)';
    const sk=t[7]||'';
    html+=`<div class="rrow${you?' you':inPI?' pi':elim?' out':''}">
      <div class="rrank" style="color:${inAuto?'var(--green)':inPI?'var(--amber)':elim?'var(--red)':'var(--text2)'}">${rank}</div>
      <div class="rball" style="border-color:${color};color:${color}">${t[1]}</div>
      <div class="rinfo">
        <div class="rname" style="color:${you?'var(--accent)':elim?'var(--text2)':'var(--text)'}">${t[0].split(' ').slice(-1)[0]}</div>
        <div class="rstats">${t[2]}-${t[3]}${sk?` <span style="color:${sk.startsWith('W')?'var(--green)':'var(--red)'}">${sk}</span>`:''}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="rwins" style="color:${you?'var(--accent)':elim?'var(--text2)':'var(--text)'}">${t[2]}W</div>
        ${elim?`<div class="rgap" style="color:var(--red)">ELIM</div>`:
          `<div class="rgap" style="color:${gb1Color}">${gb1Display}</div>`}
      </div>
    </div>`;
  }
  return html+'</div>';
}

        </div>
      </div>`;
    });
  });

  // Wild card divider
  html += `<div style="height:1px;background:linear-gradient(90deg,var(--amber),transparent);margin:6px 0 2px;position:relative">
    <span style="font-family:'JetBrains Mono',monospace;font-size:7.5px;color:var(--amber);position:absolute;right:0;top:-8px;letter-spacing:.08em">WILD CARD</span>
  </div>`;

  wcTeams.forEach((t,wi) => {
    const you=t[1]===myAbbr, color=t[8]||'#555', elim=t[9]||false;
    const inWC=wi<2, sk=t[7]||'';
    const gapVsLine = t[2] - wc2pts;
    const gapColor  = inWC?'var(--green)':gapVsLine>=0?'var(--amber)':'var(--red)';
    const gapStr    = wi===0?'WC1':wi===1?'WC2':gapVsLine===0?'LINE':(gapVsLine>0?'+'+gapVsLine:''+gapVsLine);
    html+=`<div class="rrow${you?' you':elim?' out':''}">
      <div class="rrank" style="color:${inWC?'var(--amber)':elim?'var(--red)':'var(--text2)'}">${wi+1}</div>
      <div class="rball" style="border-color:${color};color:${color}">${t[1]}</div>
      <div class="rinfo">
        <div class="rname" style="color:${you?'var(--accent)':elim?'var(--text2)':'var(--text)'}">${t[0].split(' ').slice(-1)[0]}</div>
        <div class="rstats">${t[2]}pts · ${t[3]}-${t[4]}${t[5]?'-'+t[5]:''}${sk?` <span style="color:${sk.startsWith('W')?'var(--green)':'var(--red)'}">${sk}</span>`:''}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="rwins" style="color:${you?'var(--accent)':elim?'var(--text2)':'var(--text)'}">${t[2]}pts</div>
        ${elim?`<div class="rgap" style="color:var(--red)">ELIM</div>`:`<div class="rgap" style="color:${gapColor}">${gapStr}</div>`}
      </div>
    </div>`;
  });

  return html+'</div>';
}

// ============================================================
// MAIN PICK & RENDER
// ============================================================
let CL='nba';

function pick(abbr) {
  if(!abbr) return;
  let conf, confName, league=CL;
  let found = null, rank = 0;

  if(league==='nba') {
    const ei=NBA.east.findIndex(t=>t[1]===abbr);
    const wi=NBA.west.findIndex(t=>t[1]===abbr);
    if(ei>=0){conf=NBA.east;confName='EASTERN';rank=ei+1;found=NBA.east[ei];}
    else if(wi>=0){conf=NBA.west;confName='WESTERN';rank=wi+1;found=NBA.west[wi];}
  } else if(league==='nhl') {
    const ei=NHL.east.findIndex(t=>t[1]===abbr);
    const wi=NHL.west.findIndex(t=>t[1]===abbr);
    if(ei>=0){conf=NHL.east;confName='EASTERN';rank=ei+1;found=NHL.east[ei];}
    else if(wi>=0){conf=NHL.west;confName='WESTERN';rank=wi+1;found=NHL.west[wi];}
  } else if(league==='wnba') {
    const ei=WNBA.east.findIndex(t=>t[1]===abbr);
    const wi=WNBA.west.findIndex(t=>t[1]===abbr);
    if(ei>=0){conf=WNBA.east;confName='EASTERN';rank=ei+1;found=WNBA.east[ei];}
    else if(wi>=0){conf=WNBA.west;confName='WESTERN';rank=wi+1;found=WNBA.west[wi];}
  }
  if(!found) return;

  const name = found[0];
  const w = league==='nhl' ? found[3] : found[2];
  const l = league==='nhl' ? found[4] : found[3];
  // NHL: [0]name,[1]abbr,[2]pts,[3]w,[4]l,[5]otl,[6]rem,[7]streak,[8]color,[9]elim,[10]clinched,[11]confRank,[12]divRank,[13]div
  const color = found[league==='nhl'?8:league==='wnba'?4:8];
  const rem   = found[league==='nhl'?6:league==='wnba'?(44-w-l):4] || (44-w-l);
  const streak = found[7] || '';
  const streakN = parseInt((streak||'').replace(/[WL]/,''))||1;
  const hot = (streak||'').startsWith('W')&&streakN>=3;
  const cold = (streak||'').startsWith('L')&&streakN>=3;

  let odds;
  if(league==='nba') odds=nbaOdds(found,rank,conf);
  else if(league==='nhl') odds=nhlOdds(found,rank);
  else odds=wnbaOdds(found,rank,conf);

  const today = league==='nba'?NBA.today:league==='nhl'?NHL.today:WNBA.today;
  const yesterday = league==='nba'?(DATA.nba?.yesterday||[]):league==='nhl'?(DATA.nhl?.yesterday||[]):[];
  const cheerItems = getCheerItems(abbr,conf,rank,today,league);
  const recapItems = getRecapItems(abbr,conf,rank,yesterday,league);
  const story = getStory(found,rank,conf,odds,league);
  const urgColors={'green':'var(--green)','amber':'var(--amber)','red':'var(--red)','dim':'var(--text3)'};
  const urgColor = urgColors[story.urg]||'var(--blue)';

  const inAuto = league==='nba'?rank<=6:league==='wnba'?rank<=4:rank<=8; // NHL: top 8 in playoffs
  const inPI = league==='nba'&&rank>=7&&rank<=10; // only NBA has play-in

  // Seed label
  let seedLabel, seedColor;
  if(league==='nba'){
    const elim = found[9]||w+rem<conf[9][2];
    if(elim){seedLabel='Eliminated';seedColor='var(--red)';}
    else if(inAuto){seedLabel=`#${rank} — Auto Playoff`;seedColor='var(--green)';}
    else if(inPI){seedLabel=`#${rank} — Play-In`;seedColor='var(--amber)';}
    else{seedLabel=`#${rank} — Outside`;seedColor='var(--red)';}
  } else if(league==='nhl'){
    if(found[9]){seedLabel='Eliminated';seedColor='var(--red)';}
    else if(found[10]==='div'){seedLabel=`Div Leader · Conf #${rank}`;seedColor='var(--green)';}
    else if(found[10]==='playoff'){seedLabel=`Clinched · Conf #${rank}`;seedColor='var(--green)';}
    else if(rank<=8){seedLabel=`Conf #${rank} · In playoff picture`;seedColor='var(--amber)';}
    else{seedLabel=`Conf #${rank} · Outside`;seedColor='var(--red)';}
  } else {
    if(rank<=4){seedLabel=`#${rank} Seed`;seedColor='var(--green)';}
    else{seedLabel='Outside Playoffs';seedColor='var(--red)';}
  }

  const recDisplay = league==='nhl'
    ? `${found[3]}-${found[4]}-${found[5]}`
    : `${w}-${l}`;
  const recMeta = league==='nhl'
    ? `${found[2]} PTS · ${found[6]} GAMES LEFT`
    : league==='wnba'
    ? `${44-w-l} GAMES LEFT`
    : `${rem} GAMES LEFT · ${w+l} PLAYED`;

  document.getElementById('app').innerHTML = `
  <div class="grid">
  <div class="lcol">

    <!-- HERO + ODDS -->
    <div class="card">
      <div class="hero" style="background:linear-gradient(110deg,${color}14,transparent 55%)">
        <div class="hero-l">
          <div class="tball" style="border-color:${color};color:${color}">${abbr}</div>
          <div>
            <div class="tname">${name}</div>
            <div class="tmeta">
              <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2)">${league==='nhl'?found[13]+' Division':confName+' CONF'}</span>
              ${streak?`<span class="streakbadge" style="background:${hot?'var(--gdim)':cold?'var(--rdim)':'var(--bg3)'};color:${hot?'var(--green)':cold?'var(--red)':'var(--text2)'};border:1px solid ${hot?'rgba(0,230,118,.2)':cold?'rgba(255,68,68,.2)':'var(--border)'}">${hot?'🔥':cold?'🧊':''}${streak}</span>`:''}
            </div>
          </div>
        </div>
        <div class="hero-r">
          <div class="rec" style="color:${color}">${recDisplay}</div>
          <div class="recmeta">${recMeta}</div>
        </div>
      </div>

      <div class="stats3">
        <div class="s3"><div class="s3v" style="color:${color}">#${league==='nhl'?found[12]:rank}</div><div class="s3l">${league==='nhl'?'Div Rank':'Conf Rank'}</div></div>
        <div class="s3">
          <div class="s3v" style="color:${league==='nba'?(found[6]>=7?'var(--green)':found[6]<=3?'var(--red)':'var(--amber)'):'var(--text)'}">
            ${league==='nba'?found[11]:league==='nhl'?found[14]:`${w}-${l}`}
          </div>
          <div class="s3l">${league==='nba'?'Last 10':league==='nhl'?'Last 10':'Record'}</div>
        </div>
        <div class="s3">
          ${league==='nba'?`
            <div style="display:flex;gap:8px;justify-content:center;align-items:center;height:100%">
              <div style="text-align:center">
                <div style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:var(--text2);line-height:1">Home</div>
                <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2);margin-top:2px">${found[12]||'—'}</div>
              </div>
              <div style="width:1px;height:32px;background:var(--border)"></div>
              <div style="text-align:center">
                <div style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:var(--text2);line-height:1">Away</div>
                <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2);margin-top:2px">${found[13]||'—'}</div>
              </div>
            </div>
          `:`<div class="s3v" style="color:${odds.mp>60?'var(--green)':odds.mp>30?'var(--amber)':'var(--red)'}">${league==='nhl'?found[2]+'pts':odds.mp+'%'}</div><div class="s3l">${league==='nhl'?'Total Points':'Make Playoffs'}</div>`}
        </div>
      </div>
    </div>

    <!-- WHO TO CHEER FOR TODAY -->
    <div class="card">
      <div class="chdr">
        <span class="ctitle">Who to Cheer For Today</span>
        <span class="csub">${new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase()}</span>
      </div>
      ${renderCheer(cheerItems)}
    </div>

    <!-- YESTERDAY'S RECAP -->
    <div class="card">
      <div class="chdr">
        <span class="ctitle">Yesterday's Recap</span>
        <span class="csub">${new Date(Date.now()-86400000).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase()}</span>
      </div>
      ${renderRecap(recapItems)}
    </div>

      ${renderProbs(odds,found,rank,league,conf)}

    <!-- FULL PLAYOFF BRACKET -->
    <div class="card">
      <div class="chdr">
        <span class="ctitle">Full Playoff Bracket</span>
        <span class="csub">IF SEASON ENDED TODAY · ${league==='nba'?'SEEDS 7/8 = PLAY-IN TBD':league==='wnba'?'TOP 4 PER CONF':'TOP 3 PER DIV + 2 WC'}</span>
      </div>
      <div style="padding:14px">${renderBracket(conf,confName,abbr,league)}</div>
    </div>

    ${league==='nba'&&inPI?`
    <!-- NBA PLAY-IN BRACKET -->
    <div class="card">
      <div class="chdr">
        <span class="ctitle">Play-In Bracket — ${confName} Conference</span>
        <span class="csub">% = ODDS TO MAKE PLAYOFFS FROM PLAY-IN</span>
      </div>
      ${renderPlayIn(conf,abbr)}
    </div>`:''
    }

  </div>
  <div class="rcol">

    <!-- STANDINGS RACE -->
    <div class="card">
      <div class="chdr">
        <span class="ctitle">${confName} Standings</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--text3)">${league==='nba'?'TOP 6 AUTO · 7-10 PLAY-IN':league==='wnba'?'TOP 4 QUALIFY':'TOP 3 PER DIV + 2 WC'}</span>
      </div>
      ${renderRace(conf,abbr,league)}
    </div>

    <!-- THE NUMBERS -->
    <div class="card">
      <div class="chdr"><span class="ctitle">The Numbers</span></div>
      <div class="nums">
        ${league==='nba'?`
          <div class="nrow"><span class="nlbl">Games remaining</span><span class="nval" style="color:var(--text2)">${rem}</span></div>
          <div class="nrow"><span class="nlbl">Net rating (season)</span><span class="nval" style="color:${found[5]>=0?'var(--green)':'var(--red)'}">${found[5]>0?'+':''}${found[5].toFixed(1)}</span></div>
          <div class="nrow"><span class="nlbl">Last 10 games</span><span class="nval" style="color:${found[6]>=7?'var(--green)':found[6]<=3?'var(--red)':'var(--amber)'}">${found[6]}-${10-found[6]}</span></div>
          ${found[9]?`
            <div class="nrow"><span class="nlbl">Status</span><span class="nval" style="color:var(--red)">Eliminated</span></div>
          `:''}
          ${!found[9]&&rank<=6&&rank>1?`
            <div class="nrow"><span class="nlbl">Games ahead of #7 seed</span><span class="nval" style="color:var(--green)">+${(((w-conf[6][2])+(conf[6][3]-l))/2).toFixed(1).replace('.0','')}</span></div>
          `:''}
          ${!found[9]&&rank===1?`
            <div class="nrow"><span class="nlbl">Games ahead of #2 seed</span><span class="nval" style="color:var(--green)">+${(((w-conf[1][2])+(conf[1][3]-l))/2).toFixed(1).replace('.0','')}</span></div>
          `:''}
          ${!found[9]&&rank>=7&&rank<=10?`
            <div class="nrow"><span class="nlbl">Games ${(((w-conf[9][2])+(conf[9][3]-l))/2)>=0?'above':'back of'} play-in line</span><span class="nval" style="color:${(((w-conf[9][2])+(conf[9][3]-l))/2)>=0?'var(--green)':'var(--red)'}">+${(((w-conf[9][2])+(conf[9][3]-l))/2).toFixed(1).replace('.0','')}</span></div>
            <div class="nrow"><span class="nlbl">Games back of auto spot (#6)</span><span class="nval" style="color:var(--amber)">${(((conf[5][2]-w)+(l-conf[5][3]))/2).toFixed(1).replace('.0','')}</span></div>
          `:''}
          ${!found[9]&&rank>10?`
            <div class="nrow"><span class="nlbl">Games back of play-in</span><span class="nval" style="color:var(--red)">${(((conf[9][2]-w)+(l-conf[9][3]))/2).toFixed(1).replace('.0','')}</span></div>
          `:''}
        `:''}
        ${league==='nhl'?`
          <div class="nrow"><span class="nlbl">Points</span><span class="nval" style="color:var(--text)">${found[2]}</span></div>
          <div class="nrow"><span class="nlbl">Record</span><span class="nval" style="color:var(--text2)">${found[3]}-${found[4]}${found[5]?'-'+found[5]:''}</span></div>
          <div class="nrow"><span class="nlbl">Points pace (82 gm)</span><span class="nval" style="color:var(--text2)">${Math.round(found[2]/(found[3]+found[4]+(found[5]||0)||1)*82)}</span></div>
          <div class="nrow"><span class="nlbl">Games remaining</span><span class="nval" style="color:var(--text2)">${found[6]}</span></div>
          <div class="nrow"><span class="nlbl">Max possible points</span><span class="nval" style="color:var(--text)">${found[2]+found[6]*2}</span></div>
          ${!found[9]&&found[11]<=8?`<div class="nrow"><span class="nlbl">Points ${found[2]>=(conf[7]?.[2]||72)?'above':'back of'} wild card</span><span class="nval" style="color:${found[2]>=(conf[7]?.[2]||72)?'var(--green)':'var(--red)'}">${found[2]>=(conf[7]?.[2]||72)?'+':''}${found[2]-(conf[7]?.[2]||72)}</span></div>`:''}
        `:''}
        ${league==='nhl'&&found[11]>8&&!found[9]?`
          <div class="nrow"><span class="nlbl">Points back of wild card</span><span class="nval" style="color:var(--red)">${(conf[7]?.[2]||72)-found[2]}</span></div>
        `:''}
        ${league==='wnba'?`
          <div class="nrow"><span class="nlbl">${rank<=4?'Games above 5th seed':'Games back of playoffs'}</span><span class="nval" style="color:${rank<=4?'var(--green)':'var(--red)'}">${rank<=4?'+':''}${w-(rank<=4?(conf[4]?.[2]||0):conf[3][2])}</span></div>
          <div class="nrow"><span class="nlbl">Games remaining</span><span class="nval" style="color:var(--text2)">${44-w-l}</span></div>
        `:''}
      </div>
    </div>

  </div>
  </div>`;

  // Animate probability bars
  setTimeout(()=>{
    const b1=document.getElementById('pbar1');
    const b2=document.getElementById('pbar2');
    const b3=document.getElementById('pbar3');
    const b4=document.getElementById('pbar4');
    if(b1) b1.style.width=odds.mp+'%';
    if(b2) b2.style.width=(league==='nba'?odds.auto:league==='nhl'?odds.div:odds.mp)+'%';
    if(b3) b3.style.width=(league==='nba'?odds.pi:league==='nhl'?odds.wc:0)+'%';
    if(b4) b4.style.width=(PLAYIN_SP[found[1]] ?? (odds.sp||0))+'%';
  },100);
}

// ============================================================
// LEAGUE SWITCHER & TEAM SELECTOR
// ============================================================
function switchLeague(lg) {
  CL = lg;
  document.querySelectorAll('.ltab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  // Coming soon leagues
  const comingSoon = {
    wnba: { ico:'🏀', title:'WNBA', msg:'Stats coming after July 19th All-Star Break', color:'var(--purple)' },
    mlb:  { ico:'⚾', title:'MLB',  msg:'Stats coming after July 14th All-Star Break', color:'var(--amber)' },
    nfl:  { ico:'🏈', title:'NFL',  msg:'Stats coming after Week 9',                   color:'var(--green)' },
  };

  if(comingSoon[lg]) {
    const { ico, title, msg, color } = comingSoon[lg];
    document.getElementById('tsel').innerHTML = `<option value="">— ${title} not yet active —</option>`;
    document.getElementById('app').innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;min-height:60vh">
        <div style="text-align:center;max-width:480px;padding:40px 24px">
          <div style="font-size:64px;margin-bottom:20px">${ico}</div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;text-transform:uppercase;letter-spacing:.06em;color:var(--text);margin-bottom:12px">${title} Playoff Tracker</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:13px;color:${color};background:${color}15;border:1px solid ${color}33;border-radius:8px;padding:14px 20px;margin-bottom:16px;letter-spacing:.04em">${msg}</div>
          <div style="font-size:14px;color:var(--text2);line-height:1.7">Once the season reaches that point, this tab will automatically activate with full standings, playoff odds, who to cheer for tonight, and the complete bracket picture.</div>
        </div>
      </div>`;
    return;
  }

  buildSel();
  document.getElementById('app').innerHTML = `<div class="empty">
    <div class="eico">${lg==='nba'?'🏀':'🏒'}</div>
    <div class="etitle">Select Your ${lg.toUpperCase()} Team</div>
    <div class="esub">Pick a team to see their full playoff picture.</div>
  </div>`;
}

function buildSel() {
  const sel = document.getElementById('tsel');
  sel.innerHTML = `<option value="">— Select a ${CL.toUpperCase()} team —</option>`;
  let data = {};
  if(CL==='nba') data = {East:NBA.east,West:NBA.west};
  else if(CL==='nhl') data = {East:NHL.east,West:NHL.west};
  else if(CL==='wnba') data = {East:WNBA.east,West:WNBA.west};
  Object.entries(data).forEach(([conf,teams]) => {
    const grp = document.createElement('optgroup');
    grp.label = conf+' Conference';
    [...teams].sort((a,b)=>a[0].localeCompare(b[0])).forEach(t => {
      const o = document.createElement('option');
      o.value = t[1]; o.textContent = t[0];
      grp.appendChild(o);
    });
    sel.appendChild(grp);
  });
}

// ── BOOT ─────────────────────────────────────────────────────
// 1. Render immediately with fallback hardcoded data
// 2. Fetch live data from backend — re-renders when ready
buildSel();
setTimeout(()=>{ document.getElementById('tsel').value='MIA'; pick('MIA'); }, 150);
fetchLiveData();
</script>
